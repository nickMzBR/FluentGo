<div id="taskModal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#222; color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
  <h3 id="taskTitle"></h3>
  <div id="exerciseContainer"></div>
  <button id="nextQuestionBtn">Próxima Pergunta</button>
</div>

<script>
let currentModule = 1;
let currentTask = 1;
let currentQuestion = 0;
let user = auth.currentUser;
const xpPerTask = 10;
const questionsPerTask = 5;

// Exemplo de perguntas com tipo de exercício
const exercises = [
  {type:"translate", question:"Traduza 'Hello'", answer:"Olá"},
  {type:"multiple", question:"Qual é a tradução de 'Goodbye'?", options:["Tchau","Obrigado","Por favor"], answer:"Tchau"},
  {type:"order", question:"Ordene: 'I am Nick'", words:["I","Nick","am"], answer:["I","am","Nick"]},
  {type:"translate", question:"Traduza 'Thank you'", answer:"Obrigado"},
  {type:"multiple", question:"Qual é a tradução de 'Please'?", options:["Por favor","Desculpa","Oi"], answer:"Por favor"}
];

function showExercise(){
  const ex = exercises[currentQuestion];
  const container = document.getElementById("exerciseContainer");
  container.innerHTML="";
  taskTitle.innerText=`Módulo ${currentModule} - Tarefa ${currentTask} - Pergunta ${currentQuestion+1}`;

  if(ex.type==="translate"){
    const input = document.createElement("input");
    input.id="answerInput";
    input.placeholder="Sua resposta";
    container.appendChild(document.createTextNode(ex.question));
    container.appendChild(document.createElement("br"));
    container.appendChild(input);
  } else if(ex.type==="multiple"){
    container.appendChild(document.createTextNode(ex.question));
    container.appendChild(document.createElement("br"));
    ex.options.forEach(opt=>{
      const btn = document.createElement("button");
      btn.innerText=opt;
      btn.onclick=()=>checkAnswer(opt);
      container.appendChild(btn);
      container.appendChild(document.createElement("br"));
    });
  } else if(ex.type==="order"){
    container.appendChild(document.createTextNode(ex.question));
    container.appendChild(document.createElement("br"));
    ex.words.forEach(word=>{
      const btn = document.createElement("button");
      btn.innerText=word;
      btn.onclick=()=>selectWord(word);
      container.appendChild(btn);
    });
    container.selectedWords=[];
  }
}

function selectWord(word){
  const ex = exercises[currentQuestion];
  if(!document.selectedWords) document.selectedWords=[];
  document.selectedWords.push(word);
  if(document.selectedWords.length===ex.words.length){
    checkAnswer(document.selectedWords);
  }
}

function checkAnswer(ans){
  const ex = exercises[currentQuestion];
  let correct=false;
  if(ex.type==="order"){
    correct = JSON.stringify(ans)===JSON.stringify(ex.answer);
  } else {
    correct = ans.toLowerCase()===ex.answer.toLowerCase();
  }

  if(correct){
    alert("Correto!");
  } else {
    alert("Errado! Resposta: "+ex.answer);
  }

  // Salva resposta no Firebase
  set(ref(db, `users/${user.uid}/tasks/module${currentModule}-task${currentTask}-q${currentQuestion+1}`), ans);

  currentQuestion++;
  if(currentQuestion<questionsPerTask){
    showExercise();
  } else {
    // Tarefa completa → XP + anúncio
    get(ref(db,"users/"+user.uid+"/xp")).then(snap=>{
      let xp = snap.exists()? snap.val():0;
      set(ref(db,"users/"+user.uid+"/xp"), xp+xpPerTask);
      xpDisplay.innerText=xp+xpPerTask;
    });
    taskModal.classList.add("hidden");
    adModal.classList.remove("hidden");
  }
}

// Inicializa
showExercise();
</script>
