<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; padding: 20px; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; width: 100%; overflow-y: auto; }
        .hidden { display: none !important; }
        
        /* Estilo inputs e botões */
        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #334155; background: #1E293B; color: white; margin-bottom: 12px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
        button { padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 14px; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #1D4ED8; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; margin-top: 10px; }

        /* Login Card */
        .login-box { text-align: center; margin-top: auto; margin-bottom: auto; }
        .logo { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 30px; }
        .logo span { color: var(--primary); }

        /* App Layout */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; margin-bottom: 15px; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1E293B; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #334155; height: 75px; }
        nav div { display: flex; flex-direction: column; align-items: center; font-size: 20px; cursor: pointer; opacity: 0.4; flex: 1; transition: 0.3s; }
        nav div.active { opacity: 1; color: var(--primary); }
        nav span { font-size: 10px; font-weight: 700; margin-top: 4px; }

        /* Game area */
        .word-area { min-height: 100px; border: 2px dashed #475569; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; background: rgba(255,255,255,0.02); margin: 20px 0; }
        .chip { background: #334155; padding: 12px 18px; border-radius: 12px; font-weight: 700; border: 1px solid #475569; cursor: pointer; }
        .chip.used { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

<div id="authView" class="container">
    <div class="login-box">
        <div class="logo">FLUENT<span>GO</span></div>
        <h2 id="authTitle" style="margin-bottom: 20px;">Bem-vindo de volta!</h2>
        <input type="email" id="emailInput" placeholder="E-mail">
        <input type="password" id="passInput" placeholder="Senha">
        <button id="authBtn" class="btn-primary">ENTRAR</button>
        <button id="toggleAuthBtn" class="btn-outline">Criar uma conta nova</button>
    </div>
</div>

<div id="mainApp" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
    <header>
        <div style="font-weight:900;"><span id="userNameHeader" style="font-size:11px; display:block; opacity:0.7;">Olá</span>FLUENTGO</div>
        <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="userXP">0</span></div>
    </header>

    <main id="homeTab" class="container">
        <div class="card" style="margin-top: 20px;">
            <p style="text-transform: uppercase; font-size: 12px; font-weight: 800; color: var(--primary); margin-bottom: 10px;">Progresso Atual</p>
            <h1 id="levelDisplay" style="font-size: 4rem; font-weight: 900; color: var(--gold); line-height: 1;">1</h1>
            <h2 id="levelTxt" style="margin-bottom: 5px;">Nível 1</h2>
            <p id="taskTxt" style="color: #94a3b8; margin-bottom: 25px;">Tarefa 1 de 10</p>
            <button id="startBtn" class="btn-primary">PRATICAR AGORA</button>
        </div>
    </main>

    <main id="rankingTab" class="container hidden">
        <h3 style="text-align:center; margin-bottom:20px;">🏆 RANKING GLOBAL</h3>
        <div id="leaderboardList"></div>
    </main>

    <main id="settingsTab" class="container hidden">
        <div class="card">
            <h3 style="text-align:left; font-size: 14px; margin-bottom: 15px;">CONTA</h3>
            <button id="logoutBtn" style="background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); padding: 12px;">SAIR DA CONTA</button>
        </div>
    </main>

    <nav>
        <div id="goHome" class="active">🏠<span>Home</span></div>
        <div id="goRanking">🏆<span>Ranking</span></div>
        <div id="goSettings">⚙️<span>Ajustes</span></div>
    </nav>
</div>

<div id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display: flex; flex-direction: column;">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button id="closeBtn" style="width:40px; background:none; font-size:24px; color:white;">✕</button>
            <div style="background:#334155; flex:1; height:8px; border-radius:10px; margin: 0 15px; overflow:hidden;">
                <div id="progBar" style="width:0%; height:100%; background:var(--secondary); transition: 0.3s;"></div>
            </div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center;">
            <p style="color:var(--primary); font-weight:800; font-size:12px; margin-bottom: 10px;">TRADUZA ESTA FRASE</p>
            <h2 id="qText" style="font-size: 2rem; font-weight:900; margin-bottom:30px;">...</h2>
            <div id="dropZone" class="word-area"></div>
            <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        </div>
        <button id="checkBtn" class="btn-primary">VERIFICAR</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let isLoginMode = true;
let userData = { xp: 0, lvl: 1, task: 1 };
let questions = [
    { pt: "O gato come", en: "the cat eats" },
    { pt: "O médico corre", en: "the doctor runs" },
    { pt: "A menina estuda", en: "the girl studies" }
];
let currentQ = 0;
let selection = [];

// --- SISTEMA DE TELAS ---
function showView(view) {
    document.getElementById('authView').classList.add('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    if(view === 'auth') document.getElementById('authView').classList.remove('hidden');
    if(view === 'app') document.getElementById('mainApp').classList.remove('hidden');
}

// --- CONTROLE DE AUTH ---
onAuthStateChanged(auth, (user) => {
    if (user) {
        onValue(ref(db, 'users/' + user.uid), (snap) => {
            if(snap.exists()) {
                userData = snap.val();
                updateUI();
                showView('app');
            } else {
                set(ref(db, 'users/' + user.uid), userData);
            }
        });
    } else {
        showView('auth');
    }
});

// Botão Entrar / Cadastrar
document.getElementById('authBtn').onclick = async () => {
    const email = document.getElementById('emailInput').value;
    const pass = document.getElementById('passInput').value;
    try {
        if(isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
        else await createUserWithEmailAndPassword(auth, email, pass);
    } catch (e) { alert("Erro: " + e.message); }
};

// Alternar entre Login e Cadastro
document.getElementById('toggleAuthBtn').onclick = () => {
    isLoginMode = !isLoginMode;
    document.getElementById('authTitle').innerText = isLoginMode ? "Bem-vindo de volta!" : "Crie sua conta";
    document.getElementById('authBtn').innerText = isLoginMode ? "ENTRAR" : "CADASTRAR";
    document.getElementById('toggleAuthBtn').innerText = isLoginMode ? "Criar uma conta nova" : "Já tenho uma conta";
};

// Logout
document.getElementById('logoutBtn').onclick = () => signOut(auth);

// --- LÓGICA DO JOGO ---
function updateUI() {
    document.getElementById('userXP').innerText = userData.xp;
    document.getElementById('levelDisplay').innerText = userData.lvl;
    document.getElementById('levelTxt').innerText = `Nível ${userData.lvl}`;
    document.getElementById('taskTxt').innerText = `Tarefa ${userData.task} de 10`;
}

document.getElementById('startBtn').onclick = () => {
    currentQ = 0;
    document.getElementById('practiceView').classList.remove('hidden');
    loadQuestion();
};

function loadQuestion() {
    selection = [];
    const q = questions[currentQ % questions.length];
    document.getElementById('qText').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    document.getElementById('progBar').style.width = (currentQ * 10) + "%";
    
    const bank = document.getElementById('wordBank');
    bank.innerHTML = "";
    let words = [...q.en.split(" "), "is", "a", "the"].sort(() => Math.random() - 0.5);
    
    words.forEach(w => {
        const btn = document.createElement('button');
        btn.className = "chip";
        btn.innerText = w;
        btn.onclick = () => {
            selection.push(w);
            btn.classList.add('used');
            const span = document.createElement('span');
            span.className = "chip";
            span.innerText = w;
            document.getElementById('dropZone').appendChild(span);
        };
        bank.appendChild(btn);
    });
}

document.getElementById('checkBtn').onclick = async () => {
    const q = questions[currentQ % questions.length];
    if(selection.join(" ") === q.en) {
        currentQ++;
        if(currentQ < 10) loadQuestion();
        else {
            userData.xp += 100;
            userData.task = userData.task >= 10 ? 1 : userData.task + 1;
            if(userData.task === 1) userData.lvl++;
            await update(ref(db, 'users/' + auth.currentUser.uid), userData);
            document.getElementById('practiceView').classList.add('hidden');
        }
    } else {
        alert("Ops! Tente novamente.");
        loadQuestion();
    }
};

document.getElementById('closeBtn').onclick = () => document.getElementById('practiceView').classList.add('hidden');

// --- NAVEGAÇÃO TABS ---
function tab(id, tabId) {
    document.getElementById(id).onclick = () => {
        ['homeTab', 'rankingTab', 'settingsTab'].forEach(t => document.getElementById(t).classList.add('hidden'));
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById(tabId).classList.remove('hidden');
        document.getElementById(id).classList.add('active');
    };
}
tab('goHome', 'homeTab');
tab('goRanking', 'rankingTab');
tab('goSettings', 'settingsTab');

</script>
</body>
</html>
