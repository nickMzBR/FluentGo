<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; padding: 20px; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; width: 100%; overflow-y: auto; }
        .hidden { display: none !important; }
        
        /* Estilo Inputs e Botões */
        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #334155; background: #1E293B; color: white; margin-bottom: 12px; font-size: 16px; outline: none; }
        button { padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 14px; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #1D4ED8; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; margin-top: 10px; }

        /* Login */
        .auth-container { text-align: center; justify-content: center; display: flex; flex-direction: column; height: 100%; }
        .logo { font-size: 32px; font-weight: 900; margin-bottom: 30px; }
        .logo span { color: var(--primary); }

        /* App */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #334155; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; margin-bottom: 15px; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1E293B; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #334155; height: 75px; }
        nav div { display: flex; flex-direction: column; align-items: center; font-size: 20px; cursor: pointer; opacity: 0.4; flex: 1; }
        nav div.active { opacity: 1; color: var(--primary); }
        nav span { font-size: 10px; font-weight: 700; margin-top: 4px; }

        /* Jogo */
        .word-area { min-height: 100px; border: 2px dashed #475569; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; margin: 20px 0; }
        .chip { background: #334155; padding: 12px 18px; border-radius: 12px; font-weight: 700; border: 1px solid #475569; }
        .chip.used { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

<div id="view-auth" class="container auth-container">
    <div class="logo">FLUENT<span>GO</span></div>
    <h2 id="auth-title">Entrar no FluentGo</h2>
    <p id="auth-msg" style="font-size: 12px; color: var(--error); margin-bottom: 10px; height: 15px;"></p>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button id="btn-auth-action" class="btn-primary">ENTRAR</button>
    <button id="btn-toggle-auth" class="btn-outline">Criar conta nova</button>
</div>

<div id="view-app" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
    <header>
        <div style="font-weight:900;">FLUENTGO <span id="ui-lang" style="color:var(--primary); font-size:10px;">EN</span></div>
        <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="ui-xp">0</span></div>
    </header>

    <div id="tab-home" class="container">
        <div class="card" style="margin-top: 20px;">
            <h1 id="ui-lvl-num" style="font-size: 4rem; font-weight: 900; color: var(--gold);">1</h1>
            <h2 id="ui-lvl-txt">Nível 1</h2>
            <p id="ui-task" style="color: #94a3b8; margin-bottom: 25px;">Tarefa 1 de 10</p>
            <button id="btn-start" class="btn-primary">PRATICAR AGORA</button>
        </div>
    </div>

    <div id="tab-settings" class="container hidden">
        <div class="card">
            <h3>Configurações</h3>
            <button id="btn-logout" class="btn-outline" style="color: var(--error); border-color: var(--error);">SAIR DA CONTA</button>
        </div>
    </div>

    <nav>
        <div id="nav-home" class="active">🏠<span>Home</span></div>
        <div id="nav-settings">⚙️<span>Ajustes</span></div>
    </nav>
</div>

<div id="view-practice" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display: flex; flex-direction: column;">
    <div class="container">
        <button id="btn-close-practice" style="width:40px; background:none; color:white; font-size:24px; text-align:left;">✕</button>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center;">
            <h2 id="q-pt" style="margin-bottom:20px;">Traduza a frase</h2>
            <div id="drop-zone" class="word-area"></div>
            <div id="word-bank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;"></div>
        </div>
        <button id="btn-check" class="btn-primary">VERIFICAR</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Dados Iniciais Seguros (Evita Undefined)
let user = { xp: 0, lvl: 1, task: 1, lang: "English" };
let isLogin = true;

// --- CONTROLE DE TELAS ---
function switchView(view) {
    document.getElementById('view-auth').classList.add('hidden');
    document.getElementById('view-app').classList.add('hidden');
    document.getElementById('view-practice').classList.add('hidden');
    document.getElementById('view-' + view).classList.remove('hidden');
}

// --- AUTH ---
onAuthStateChanged(auth, (u) => {
    if (u) {
        onValue(ref(db, 'users/' + u.uid), (snap) => {
            const data = snap.val();
            if (data) user = { ...user, ...data }; // Mescla com os dados do banco
            else set(ref(db, 'users/' + u.uid), user); // Cria se não existir
            
            updateUI();
            switchView('app');
        });
    } else {
        switchView('auth');
    }
});

document.getElementById('btn-auth-action').onclick = async () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    const msg = document.getElementById('auth-msg');
    try {
        if (isLogin) await signInWithEmailAndPassword(auth, e, p);
        else await createUserWithEmailAndPassword(auth, e, p);
    } catch (err) { msg.innerText = "Erro: Dados inválidos"; }
};

document.getElementById('btn-toggle-auth').onclick = () => {
    isLogin = !isLogin;
    document.getElementById('auth-title').innerText = isLogin ? "Entrar no FluentGo" : "Criar sua conta";
    document.getElementById('btn-auth-action').innerText = isLogin ? "ENTRAR" : "CADASTRAR";
    document.getElementById('btn-toggle-auth').innerText = isLogin ? "Criar conta nova" : "Já tenho conta";
};

document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

// --- INTERFACE ---
function updateUI() {
    document.getElementById('ui-xp').innerText = user.xp || 0;
    document.getElementById('ui-lvl-num').innerText = user.lvl || 1;
    document.getElementById('ui-lvl-txt').innerText = "Nível " + (user.lvl || 1);
    document.getElementById('ui-task').innerText = "Tarefa " + (user.task || 1) + " de 10";
}

// --- JOGO SIMPLIFICADO ---
let currentSelection = [];
const phrase = { pt: "O gato bebe", en: "the cat drinks" };

document.getElementById('btn-start').onclick = () => {
    switchView('practice');
    loadLevel();
};

function loadLevel() {
    currentSelection = [];
    document.getElementById('q-pt').innerText = phrase.pt;
    document.getElementById('drop-zone').innerHTML = "";
    const bank = document.getElementById('word-bank');
    bank.innerHTML = "";
    
    const words = [...phrase.en.split(" "), "is", "a"].sort(() => Math.random() - 0.5);
    words.forEach(w => {
        const b = document.createElement('button');
        b.className = "chip";
        b.innerText = w;
        b.onclick = () => {
            currentSelection.push(w);
            b.classList.add('used');
            const s = document.createElement('span'); s.className = "chip"; s.innerText = w;
            document.getElementById('drop-zone').appendChild(s);
        };
        bank.appendChild(b);
    });
}

document.getElementById('btn-check').onclick = async () => {
    if (currentSelection.join(" ") === phrase.en) {
        user.xp += 10;
        await update(ref(db, 'users/' + auth.currentUser.uid), user);
        switchView('app');
    } else {
        alert("Errado! Tente de novo.");
        loadLevel();
    }
};

document.getElementById('btn-close-practice').onclick = () => switchView('app');

// Navegação de Tabs
document.getElementById('nav-home').onclick = () => {
    document.getElementById('tab-home').classList.remove('hidden');
    document.getElementById('tab-settings').classList.add('hidden');
    document.getElementById('nav-home').classList.add('active');
    document.getElementById('nav-settings').classList.remove('active');
};
document.getElementById('nav-settings').onclick = () => {
    document.getElementById('tab-home').classList.add('hidden');
    document.getElementById('tab-settings').classList.remove('hidden');
    document.getElementById('nav-settings').classList.add('active');
    document.getElementById('nav-home').classList.remove('active');
};

</script>
</body>
</html>
