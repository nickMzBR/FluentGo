<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; padding: 15px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; width: 100%; overflow-y: auto; padding-bottom: 90px; }
        .hidden { display: none !important; }
        
        /* Layout */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; margin-bottom: 15px; }
        
        /* Botões e Inputs */
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: #0F172A; color: white; margin-bottom: 10px; font-weight: 600; outline: none; }
        button { padding: 16px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 15px; text-transform: uppercase; transition: 0.2s; }
        .btn-check { background: var(--primary); color: white; box-shadow: 0 5px 0 #1D4ED8; z-index: 10; }
        .btn-check:active { transform: translateY(3px); box-shadow: 0 2px 0 #1D4ED8; }
        .btn-lang { background: #0F172A; color: white; border: 1px solid #334155; border-radius: 12px; padding: 12px; font-size: 11px; }
        .btn-lang.active { border: 2px solid var(--primary); background: rgba(37, 99, 235, 0.1); }

        /* Nav */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1E293B; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #334155; z-index: 100; height: 75px; }
        nav div { display: flex; flex-direction: column; align-items: center; font-size: 20px; cursor: pointer; opacity: 0.4; flex: 1; }
        nav div.active { opacity: 1; color: var(--primary); }
        nav span { font-size: 9px; font-weight: 700; margin-top: 5px; text-transform: uppercase; }

        /* Jogo */
        .word-area { min-height: 110px; border: 2px dashed #475569; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; background: rgba(255,255,255,0.02); margin: 15px 0; }
        .chip { background: #334155; padding: 12px 16px; border-radius: 14px; font-weight: 700; color: white; border: 1px solid #475569; box-shadow: 0 3px 0 #000; }
        .chip:active { transform: translateY(2px); box-shadow: none; }
        .chip.used { opacity: 0.1; pointer-events: none; }

        /* Feedback Visual */
        #feedback-banner { position: fixed; bottom: -100px; left: 0; right: 0; padding: 30px; transition: 0.4s; z-index: 999; display: flex; justify-content: space-between; align-items: center; }
        #feedback-banner.show { bottom: 0; }
        .correct-bg { background: #065F46; color: #D1FAE5; }
        .wrong-bg { background: #991B1B; color: #FEE2E2; }
    </style>
</head>
<body>

<div id="view-auth" class="container" style="justify-content: center; text-align: center;">
    <h1 style="font-size: 32px; font-weight: 900; margin-bottom: 20px;">FLUENT<span style="color:var(--primary)">GO</span></h1>
    <input type="email" id="email" placeholder="Seu e-mail">
    <input type="password" id="password" placeholder="Sua senha">
    <button id="btn-auth" class="btn-check">ENTRAR</button>
    <button id="btn-toggle-auth" style="background:none; color:#94a3b8; margin-top:15px; text-transform:none;">Não tem conta? Clique aqui</button>
</div>

<div id="view-app" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
    <header>
        <div style="font-weight:900;"><span id="ui-user-head" style="font-size:10px; display:block; opacity:0.6;">...</span>FLUENTGO <span id="ui-lang-tag" style="color:var(--primary); font-size:10px;">EN</span></div>
        <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="ui-xp">0</span></div>
    </header>

    <main id="tab-home" class="container">
        <div class="card" style="margin-top: 40px;">
            <h1 id="ui-lvl" style="font-size: 4.5rem; font-weight: 900; color: var(--gold); line-height: 1;">1</h1>
            <h2 id="ui-lvl-txt">Nível 1</h2>
            <p id="ui-task" style="color: #94a3b8; margin-bottom: 30px;">Tarefa 1 de 10</p>
            <button id="btn-start" class="btn-check">PRATICAR AGORA</button>
        </div>
    </main>

    <main id="tab-ranking" class="container hidden">
        <h3 style="text-align:center; margin-bottom:20px;">🏆 RANKING GLOBAL</h3>
        <div id="ranking-list"></div>
    </main>

    <main id="tab-settings" class="container hidden">
        <div class="card">
            <h3 style="text-align:left; font-size: 13px; color: var(--primary);">👤 NOME DE USUÁRIO</h3>
            <input type="text" id="input-username" placeholder="Seu nome">
            <button id="btn-save-name" class="btn-check" style="padding: 10px; font-size: 12px;">SALVAR ALTERAÇÃO</button>
        </div>
        <div class="card">
            <h3 style="text-align:left; font-size: 13px; margin-bottom:15px;">🌍 IDIOMA</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;" id="lang-grid">
                <button class="btn-lang" onclick="setLang('English')">English</button>
                <button class="btn-lang" onclick="setLang('Spanish')">Español</button>
                <button class="btn-lang" onclick="setLang('French')">Français</button>
                <button class="btn-lang" onclick="setLang('Italian')">Italiano</button>
            </div>
            <button id="btn-logout" class="btn-check" style="background:var(--error); margin-top:20px; font-size:12px;">SAIR DA CONTA</button>
        </div>
    </main>

    <nav>
        <div id="nav-home" class="active">🏠<span>Home</span></div>
        <div id="nav-ranking">🏆<span>Ranking</span></div>
        <div id="nav-settings">⚙️<span>Ajustes</span></div>
    </nav>
</div>

<div id="view-practice" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:999; display: flex; flex-direction: column;">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button id="btn-close-practice" style="width:40px; background:none; font-size:24px; color:white;">✕</button>
            <div style="background:#334155; flex:1; height:12px; border-radius:10px; overflow:hidden; margin: 0 15px;">
                <div id="ui-prog" style="width:0%; height:100%; background:var(--secondary); transition:0.5s;"></div>
            </div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center;">
            <p style="color:var(--primary); font-weight:800; font-size:12px; margin-bottom:10px;">TRADUZA ESTA FRASE</p>
            <h2 id="q-text" style="font-size: 1.8rem; font-weight:900; margin-bottom:20px;">...</h2>
            <div id="drop-zone" class="word-area"></div>
            <div id="word-bank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        </div>
        <button id="btn-verify" class="btn-check">VERIFICAR</button>
    </div>
</div>

<div id="feedback-banner">
    <h3 id="feedback-msg">Muito bem!</h3>
    <button id="btn-next" class="btn-check" style="width:auto; padding: 15px 30px;">CONTINUAR</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = { username: "Estudante", xp: 0, lvl: 1, task: 1, lang: "English" };
let isLogin = true;
let currentSelection = [];
let currentTaskNum = 1;

// --- SONS E VOZ ---
const soundOk = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
const soundError = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = user.lang === 'Spanish' ? 'es-ES' : user.lang === 'French' ? 'fr-FR' : user.lang === 'Italian' ? 'it-IT' : 'en-US';
    window.speechSynthesis.speak(msg);
}

// --- LOGICA FIREBASE ---
onAuthStateChanged(auth, u => {
    if(u) {
        onValue(ref(db, 'users/'+u.uid), snap => {
            if(snap.exists()) { user = {...user, ...snap.val()}; updateUI(); }
            else { set(ref(db, 'users/'+u.uid), user); }
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
        });
        onValue(ref(db, 'users'), snap => { if(snap.exists()) renderRanking(snap.val()); });
    } else {
        document.getElementById('view-app').classList.add('hidden');
        document.getElementById('view-auth').classList.remove('hidden');
    }
});

function updateUI() {
    document.getElementById('ui-user-head').innerText = `Olá, ${user.username}`;
    document.getElementById('ui-xp').innerText = user.xp;
    document.getElementById('ui-lvl').innerText = user.lvl;
    document.getElementById('ui-lvl-txt').innerText = `Nível ${user.lvl}`;
    document.getElementById('ui-task').innerText = `Tarefa ${user.task} de 10`;
    document.getElementById('ui-lang-tag').innerText = user.lang.substring(0,2).toUpperCase();
    document.querySelectorAll('.btn-lang').forEach(b => {
        b.classList.toggle('active', b.innerText.includes(user.lang) || (b.innerText === 'Español' && user.lang === 'Spanish'));
    });
}

// --- ATIVIDADES ---
const DATA = {
    English: { q: "O cachorro come", a: "the dog eats" },
    Spanish: { q: "O cachorro come", a: "el perro come" },
    French: { q: "O cachorro come", a: "le chien mange" },
    Italian: { q: "O cachorro come", a: "il cane mangia" }
};

document.getElementById('btn-start').onclick = () => {
    currentTaskNum = 1;
    document.getElementById('view-practice').classList.remove('hidden');
    initQuest();
};

function initQuest() {
    currentSelection = [];
    const item = DATA[user.lang] || DATA.English;
    document.getElementById('q-text').innerText = item.q;
    document.getElementById('drop-zone').innerHTML = "";
    document.getElementById('ui-prog').style.width = (currentTaskNum * 10) + "%";
    
    const bank = document.getElementById('word-bank'); bank.innerHTML = "";
    const words = [...item.a.split(" "), "is", "a"].sort(() => Math.random() - 0.5);
    
    words.forEach(w => {
        const b = document.createElement('button');
        b.className = "chip"; b.innerText = w;
        b.onclick = () => {
            speak(w);
            currentSelection.push(w);
            b.classList.add('used');
            const s = document.createElement('span'); s.className = "chip"; s.innerText = w;
            document.getElementById('drop-zone').appendChild(s);
        };
        bank.appendChild(b);
    });
}

document.getElementById('btn-verify').onclick = () => {
    const item = DATA[user.lang] || DATA.English;
    const banner = document.getElementById('feedback-banner');
    const msg = document.getElementById('feedback-msg');
    
    if(currentSelection.join(" ") === item.a) {
        soundOk.play();
        msg.innerText = "Excelente! +10 XP";
        banner.className = "show correct-bg";
    } else {
        soundError.play();
        msg.innerText = "Ops! A resposta era: " + item.a;
        banner.className = "show wrong-bg";
    }
};

document.getElementById('btn-next').onclick = async () => {
    document.getElementById('feedback-banner').classList.remove('show');
    if(currentTaskNum < 3) { // Reduzi para 3 para teste rápido, mude para 10 depois
        currentTaskNum++;
        initQuest();
    } else {
        user.xp += 50;
        user.task = user.task >= 10 ? 1 : user.task + 1;
        if(user.task === 1) user.lvl++;
        await update(ref(db, 'users/'+auth.currentUser.uid), user);
        document.getElementById('view-practice').classList.add('hidden');
    }
};

// --- RESTO DAS FUNÇÕES ---
document.getElementById('btn-auth').onclick = async () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    try {
        if(isLogin) await signInWithEmailAndPassword(auth, e, p);
        else await createUserWithEmailAndPassword(auth, e, p);
    } catch(err) { alert("Erro na autenticação"); }
};

document.getElementById('btn-save-name').onclick = () => {
    const n = document.getElementById('input-username').value;
    if(n) update(ref(db, 'users/'+auth.currentUser.uid), {username: n});
};

window.setLang = (l) => {
    user.lang = l;
    update(ref(db, 'users/'+auth.currentUser.uid), {lang: l});
};

function renderRanking(all) {
    const sorted = Object.values(all).sort((a,b) => b.xp - a.xp).slice(0,10);
    document.getElementById('ranking-list').innerHTML = sorted.map((u, i) => `
        <div style="display:flex; justify-content:space-between; padding:15px; background:rgba(255,255,255,0.05); border-radius:15px; margin-bottom:8px;">
            <span>${i+1}º ${u.username}</span>
            <strong style="color:var(--gold)">${u.xp} XP</strong>
        </div>
    `).join('');
}

document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
document.getElementById('btn-close-practice').onclick = () => document.getElementById('view-practice').classList.add('hidden');
document.getElementById('btn-toggle-auth').onclick = () => { isLogin = !isLogin; document.getElementById('btn-auth').innerText = isLogin ? "ENTRAR" : "CADASTRAR"; };

// Navegação Tabs
const tabs = ['home', 'ranking', 'settings'];
tabs.forEach(t => {
    document.getElementById('nav-'+t).onclick = () => {
        tabs.forEach(x => { document.getElementById('tab-'+x).classList.add('hidden'); document.getElementById('nav-'+x).classList.remove('active'); });
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('nav-'+t).classList.add('active');
    };
});
</script>
</body>
</html>
