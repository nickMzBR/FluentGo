<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo | Aprenda & Pratique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; padding: 15px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; width: 100%; overflow-y: auto; padding-bottom: 90px; }
        .hidden { display: none !important; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: #0F172A; color: white; margin-bottom: 10px; font-weight: 600; outline: none; }
        button { padding: 16px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 15px; text-transform: uppercase; transition: 0.2s; }
        .btn-check { background: var(--primary); color: white; box-shadow: 0 5px 0 #1D4ED8; }
        .btn-check:active { transform: translateY(3px); box-shadow: 0 2px 0 #1D4ED8; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1E293B; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #334155; z-index: 100; height: 75px; }
        nav div { display: flex; flex-direction: column; align-items: center; font-size: 20px; cursor: pointer; opacity: 0.4; flex: 1; }
        nav span { font-size: 9px; font-weight: 700; margin-top: 5px; text-transform: uppercase; }
        nav div.active { opacity: 1; color: var(--primary); }
        .word-area { min-height: 120px; border: 2px dashed #475569; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; background: rgba(255,255,255,0.02); margin: 15px 0; }
        .chip { background: #334155; padding: 12px 16px; border-radius: 14px; font-weight: 700; color: white; border: 1px solid #475569; }
        .chip.used { opacity: 0.1; pointer-events: none; }

        /* MODAL DE TUTORIAL */
        #tutorialView { position: fixed; inset: 0; background: var(--bg); z-index: 10001; display: flex; flex-direction: column; padding: 20px; justify-content: center; }
        .tip-box { background: var(--card); padding: 30px; border-radius: 30px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div id="tutorialView" class="hidden">
    <div class="tip-box">
        <div style="font-size: 40px; margin-bottom: 15px;">💡</div>
        <h2 id="tutorialTitle" style="color: var(--primary); margin-bottom: 10px;">Dica do Nível</h2>
        <p id="tutorialText" style="line-height: 1.6; color: #cbd5e1; margin-bottom: 25px;"></p>
        <button onclick="startActualPractice()" class="btn-check">ENTENDI, VAMOS LÁ!</button>
    </div>
</div>

<header id="appHeader" class="hidden">
    <div style="font-weight:900;"><span id="userNameHeader" style="font-size:11px; display:block; opacity:0.7;">Olá</span>FLUENTGO <span id="langTag" style="color:var(--primary); font-size:10px;">EN</span></div>
    <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="userXP">0</span></div>
</header>

<main id="homeView" class="container hidden">
    <div class="card" style="margin-top: 40px;">
        <h1 id="levelDisplay" style="font-size: 4rem; font-weight: 900; color: var(--gold);">1</h1>
        <h2 id="levelTxt">Nível 1</h2>
        <p id="taskTxt" style="color: #94a3b8; margin-bottom: 30px;">Tarefa 1 de 10</p>
        <button id="startBtn" class="btn-check">PRATICAR AGORA</button>
    </div>
</main>

<main id="rankingView" class="container hidden">
    <h3 style="text-align:center; margin-bottom:20px;">🏆 RANKING GLOBAL</h3>
    <div id="leaderboardList"></div>
</main>

<main id="settingsView" class="container hidden">
    <div class="card">
        <h3 style="text-align:left; font-size: 14px; color: var(--primary);">👤 PERFIL</h3>
        <input type="text" id="usernameInput" placeholder="Seu apelido">
        <button id="saveUserBtn" class="btn-check" style="padding: 10px; font-size: 12px;">SALVAR NICKNAME</button>
    </div>
    
    <div class="card">
        <h3 style="text-align:left; margin-bottom:15px; font-size: 14px;">🌎 IDIOMA</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom: 20px;">
            <button onclick="changeLang('English')" class="btn-lang" id="ln-English" style="background:#0F172A; color:white; border-radius:12px; padding:12px;">English</button>
            <button onclick="changeLang('Spanish')" class="btn-lang" id="ln-Spanish" style="background:#0F172A; color:white; border-radius:12px; padding:12px;">Español</button>
        </div>
        
        <hr style="border:0; border-top:1px solid #334155; margin: 15px 0;">
        <button onclick="auth.signOut().then(()=>location.reload())" style="background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); padding: 12px; font-size: 12px;">SAIR DA CONTA</button>
    </div>
</main>

<div id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display: flex; flex-direction: column;">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <button onclick="closePractice()" style="width:40px; background:none; font-size:24px; color:white; border:none;">✕</button>
            <div style="background:#334155; flex:1; height:10px; border-radius:10px; overflow:hidden; margin: 0 15px;">
                <div id="innerBar" style="width:0%; height:100%; background:var(--secondary); transition:0.4s;"></div>
            </div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
            <p id="qStatus" style="text-align:center; font-weight:900; color:var(--primary); font-size:12px;"></p>
            <h2 id="targetPhrase" style="text-align:center; font-size: 1.8rem; font-weight:900; margin:15px 0;">...</h2>
            <div id="dropZone" class="word-area"></div>
            <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        </div>
        <div style="padding-bottom: 25px;">
            <div id="feedbackText" style="text-align:center; margin-bottom:15px; font-weight:800; min-height:24px;"></div>
            <button id="actionBtn" class="btn-check">VERIFICAR</button>
        </div>
    </div>
</div>

<nav id="bottomNav" class="hidden">
    <div onclick="showTab('homeView')" id="nv-home" class="active">🏠<span>Home</span></div>
    <div onclick="showTab('rankingView')" id="nv-ranking">🏆<span>Ranking</span></div>
    <div onclick="showTab('settingsView')" id="nv-settings">⚙️<span>Ajustes</span></div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Dicionário Ampliado
const DATA = {
    LIVING: { PT:["O gato","O médico","A menina","O cachorro","O irmão","O professor"], EN:["The cat","The doctor","The girl","The dog","The brother","The teacher"], ES:["El gato","El médico","La niña","El perro","El hermano","El profesor"] },
    THINGS: { PT:["O carro","A casa","O livro","A maçã","A ponte","O sol"], EN:["The car","The house","The book","The apple","The bridge","The sun"], ES:["El coche","La casa","El libro","La manzana","El puente","El sol"] },
    VERBS: { PT:["bebe","corre","come","dorme","estuda","canta"], EN:["drinks","runs","eats","sleeps","studies","sings"], ES:["bebe","corre","come","duerme","estudia","canta"] },
    ADJS: { PT:["azul","grande","bonito","caro","rápido","feliz"], EN:["blue","big","beautiful","expensive","fast","happy"], ES:["azul","grande","hermoso","caro","rápido","feliz"] }
};

let user = { username: "Player", xp: 0, lvl: 1, task: 1, lang: "English" };
let currentQs = [], qIdx = 0, selection = [], state = "CHECK";

onAuthStateChanged(auth, (u) => {
    if(u) {
        onValue(ref(db, 'users/'+u.uid), (snap) => {
            const d = snap.val(); if(d) user = { ...user, ...d };
            updateUI();
            ['appHeader', 'homeView', 'bottomNav'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        });
        onValue(ref(db, 'users'), (snap) => { if(snap.exists()) buildRanking(snap.val()); });
    }
});

function updateUI() {
    document.getElementById('userNameHeader').innerText = `Olá, ${user.username}`;
    document.getElementById('usernameInput').value = user.username;
    document.getElementById('userXP').innerText = user.xp;
    document.getElementById('levelDisplay').innerText = user.lvl;
    document.getElementById('levelTxt').innerText = `Nível ${user.lvl}`;
    document.getElementById('taskTxt').innerText = `Tarefa ${user.task} de 10`;
}

// SISTEMA DE ENSINO (TUTORIAL)
document.getElementById('startBtn').onclick = () => {
    const code = user.lang === "English" ? "Inglês" : "Espanhol";
    const tips = {
        "English": [
            "Para descrever objetos, usamos 'The' (O/A) + 'is' (é). Ex: The car is blue.",
            "Para seres vivos, o verbo ganha um 's' no final. Ex: The cat eats (O gato come).",
            "Adjetivos em inglês costumam vir depois do 'is' em frases simples."
        ],
        "Spanish": [
            "Em espanhol, 'O' é 'El' e 'A' é 'La'. Ex: El gato, La casa.",
            "O verbo 'é' em espanhol é 'es'. Ex: El coche es azul.",
            "Muitas palavras são parecidas com o português, mas a pronúncia muda!"
        ]
    };
    
    const randomTip = tips[user.lang][Math.floor(Math.random() * tips[user.lang].length)];
    document.getElementById('tutorialTitle').innerText = `Lição de ${code}`;
    document.getElementById('tutorialText').innerText = randomTip;
    document.getElementById('tutorialView').classList.remove('hidden');
};

function startActualPractice() {
    document.getElementById('tutorialView').classList.add('hidden');
    qIdx = 0; 
    currentQs = generateUniqueQuestions();
    document.getElementById('practiceView').classList.remove('hidden');
    loadQ();
}

function generateUniqueQuestions() {
    let list = [];
    let code = user.lang === "English" ? "EN" : "ES";
    let used = new Set();
    while(list.length < 10) {
        let isAction = Math.random() > 0.5;
        let sIdx = Math.floor(Math.random() * DATA.LIVING.PT.length);
        let key = `${isAction}-${sIdx}-${Math.floor(Math.random()*5)}`;
        if(!used.has(key)) {
            used.add(key);
            if(isAction) {
                list.push({ pt: `${DATA.LIVING.PT[sIdx]} ${DATA.VERBS.PT[sIdx]}`, target: `${DATA.LIVING[code][sIdx]} ${DATA.VERBS[code][sIdx]}`.toLowerCase() });
            } else {
                let is = code === "EN" ? "is" : "es";
                list.push({ pt: `${DATA.THINGS.PT[sIdx]} é ${DATA.ADJS.PT[sIdx]}`, target: `${DATA.THINGS[code][sIdx]} ${is} ${DATA.ADJS[code][sIdx]}`.toLowerCase() });
            }
        }
    }
    return list;
}

function loadQ() {
    state = "CHECK"; selection = [];
    const q = currentQs[qIdx];
    document.getElementById('qStatus').innerText = `QUESTÃO ${qIdx + 1}/10`;
    document.getElementById('targetPhrase').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    document.getElementById('feedbackText').innerText = "";
    document.getElementById('innerBar').style.width = `${(qIdx / 10) * 100}%`;
    document.getElementById('actionBtn').innerText = "VERIFICAR";
    document.getElementById('actionBtn').style.background = "var(--primary)";
    const bank = document.getElementById('wordBank'); bank.innerHTML = "";
    let words = [...q.target.split(" "), "not", "a"].sort(() => Math.random() - 0.5);
    words.forEach(w => {
        const b = document.createElement('button'); b.className = "chip"; b.innerText = w;
        b.onclick = () => { if(state === "CHECK") { selection.push(w); b.classList.add('used'); const s = document.createElement('span'); s.className = "chip"; s.innerText = w; document.getElementById('dropZone').appendChild(s); }};
        bank.appendChild(b);
    });
}

document.getElementById('actionBtn').onclick = async function() {
    if(state === "CHECK") {
        if(selection.join(" ").toLowerCase() === currentQs[qIdx].target) {
            this.innerText = "PRÓXIMA"; this.style.background = "var(--secondary)";
            document.getElementById('feedbackText').innerText = "CORRETO! ✨";
            state = "NEXT";
        } else {
            document.getElementById('feedbackText').innerText = "OPS! TENTE DE NOVO";
            setTimeout(() => { document.getElementById('dropZone').innerHTML = ""; selection = []; document.querySelectorAll('.chip').forEach(c => c.classList.remove('used')); }, 600);
        }
    } else {
        qIdx++;
        if(qIdx < 10) loadQ();
        else {
            let nextTask = user.task + 1;
            let nextLvl = user.lvl;
            if(nextTask > 10) { nextTask = 1; nextLvl++; }
            user.xp += 100; user.task = nextTask; user.lvl = nextLvl;
            await update(ref(db, 'users/'+auth.currentUser.uid), user);
            document.getElementById('practiceView').classList.add('hidden');
        }
    }
};

window.showTab = (id) => {
    ['homeView', 'rankingView', 'settingsView'].forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
};
window.closePractice = () => document.getElementById('practiceView').classList.add('hidden');
window.changeLang = (l) => { user.lang = l; update(ref(db, 'users/'+auth.currentUser.uid), {lang: l}); };
document.getElementById('saveUserBtn').onclick = () => {
    const n = document.getElementById('usernameInput').value.trim();
    if(n) update(ref(db, 'users/'+auth.currentUser.uid), {username: n});
};

function buildRanking(all) {
    const sorted = Object.values(all).sort((a,b) => (b.xp || 0) - (a.xp || 0)).slice(0, 10);
    document.getElementById('leaderboardList').innerHTML = sorted.map((u, i) => `
        <div style="display:flex; justify-content:space-between; padding:12px; background:rgba(255,255,255,0.05); border-radius:12px; margin-bottom:5px;">
            <span>${i+1}º ${u.username || 'Player'}</span>
            <span style="color:var(--gold)">${u.xp || 0} XP</span>
        </div>
    `).join('');
}
</script>
</body>
</html>
