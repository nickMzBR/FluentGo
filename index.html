<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6478620932842773" crossorigin="anonymous"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --premium: #F59E0B; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin:0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 1000; }
        .stat-badge { background: #000; padding: 5px 12px; border-radius: 12px; font-weight: 800; display: flex; align-items: center; gap: 5px; color: #FF4500; }

        /* ADS OVERLAY (TRAVA OBRIGATÓRIA) */
        #adOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .ad-content { width: 90%; max-width: 350px; height: 450px; background: #1e293b; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #334155; position: relative; }
        #closeAdBtn { margin-top: 20px; width: 85%; padding: 20px; border-radius: 18px; border: none; font-weight: 900; background: #334155; color: #94a3b8; pointer-events: none; transition: 0.3s; }
        #closeAdBtn.ready { background: var(--primary); color: white; pointer-events: auto; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }

        /* ESTILOS GERAIS */
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #475569; margin-bottom: 15px; }
        .progress-bar { background: #334155; height: 10px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.8s; }
        button { padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; margin-bottom: 10px; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-premium { background: var(--premium); color: white; box-shadow: 0 4px 0 #B45309; }
        
        /* GAMEPLAY */
        .teach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .word-card { background: var(--bg); border-radius: 20px; border: 2px solid #334155; text-align: center; padding-bottom: 10px; transition: 0.2s; }
        .word-img { width: 100%; height: 100px; object-fit: cover; border-radius: 18px 18px 0 0; }
        .word-area { min-height: 100px; border: 2px dashed #475569; border-radius: 20px; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2); }
        .chip { background: #334155; padding: 14px 18px; border-radius: 16px; font-weight: 700; cursor: pointer; color: white; box-shadow: 0 3px 0 #1e293b; }
        .chip.used { opacity: 0.1; pointer-events: none; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<header class="hidden" id="mainHeader">
    <div style="font-weight:900; letter-spacing:-1px;">FLUENTGO <span id="langTag" style="font-size:10px; background:var(--primary); padding:2px 6px; border-radius:5px; margin-left:5px;">EN</span></div>
    <div style="display:flex; align-items:center; gap:12px;">
        <div class="stat-badge">🔥 <span id="streakVal">0</span></div>
        <div onclick="toggleSettings(true)" style="cursor:pointer; font-size: 1.4rem;">⚙️</div>
    </div>
</header>

<div id="adOverlay">
    <div class="ad-content">
        <span style="position:absolute; top:15px; left:15px; font-size:10px; color:#94a3b8;">ANÚNCIO</span>
        
        <ins class="adsbygoogle"
             style="display:block; width:300px; height:250px"
             data-ad-client="ca-pub-6478620932842773"
             data-ad-slot="auto"
             data-ad-format="rectangle"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

        <div style="text-align:center; padding:20px;">
            <div style="font-size:60px;">📺</div>
            <p style="color:#94a3b8;">O anúncio aparecerá aqui após a aprovação do Google.</p>
        </div>
    </div>
    <button id="closeAdBtn">Aguarde 5s...</button>
</div>

<div id="settingsModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
    <div style="background:var(--card); width:85%; padding:25px; border-radius:35px; text-align:center; border:1px solid #475569;">
        <button onclick="alert('Loja em breve!')" class="btn-premium">⭐ SEJA PREMIUM</button>
        <button onclick="alert('Funcionalidade Premium!')" style="background:#475569; color:white;">🚫 REMOVER ADS</button>
        <hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="changeLanguage('English')" class="btn-main">🇺🇸 EN</button>
            <button onclick="changeLanguage('Spanish')" class="btn-main">🇪🇸 ES</button>
            <button onclick="changeLanguage('French')" class="btn-main">🇫🇷 FR</button>
            <button onclick="changeLanguage('Italian')" class="btn-main">🇮🇹 IT</button>
        </div>
        <button onclick="toggleSettings(false)" style="background:transparent; color:white; margin-top:10px;">VOLTAR</button>
        <button onclick="handleLogout()" style="color:#ef4444; background:none; font-size:12px; margin-top:10px;">SAIR</button>
    </div>
</div>

<main id="landingView" class="container">
    <h1 style="text-align:center; font-size:3.5rem; font-weight:900; margin-top:60px;">Fluent<span style="color:var(--primary)">Go</span></h1>
    <div class="card">
        <div id="regOnly" class="hidden"><input type="text" id="username" placeholder="Nome" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:none; background:#0f172a; color:white;"></div>
        <input type="email" id="email" placeholder="E-mail" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:none; background:#0f172a; color:white;">
        <input type="password" id="password" placeholder="Senha" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:none; background:#0f172a; color:white;">
        <button id="authBtn" class="btn-main">ENTRAR</button>
        <button onclick="toggleAuthMode()" style="background:none; color:#94a3b8; font-size:0.8rem; text-decoration:underline;">Criar conta</button>
    </div>
</main>

<main id="dashboardView" class="container hidden">
    <div class="card">
        <h2 id="levelLabel">Carregando...</h2>
        <div class="progress-bar"><div id="mainProgress" class="progress-fill"></div></div>
        <p id="xpText" style="color:#94a3b8; font-size:0.9rem;">0 / 100 XP</p>
        <button id="actionBtn" class="btn-main">CARREGANDO...</button>
    </div>
    <div class="card">
        <h3 style="margin:0 0 10px 0;">🏆 Ranking</h3>
        <div id="rankList"></div>
    </div>
</main>

<main id="teachingView" class="container hidden">
    <h2 style="text-align:center;">Dicionário</h2>
    <div class="teach-grid" id="teachGrid"></div>
    <button id="confirmTeach" style="background:var(--secondary); color:white;">APRENDI!</button>
</main>

<main id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:2000; padding:20px;">
    <div class="progress-bar"><div id="taskProgress" class="progress-fill"></div></div>
    <div class="container">
        <div id="audioBtn" style="font-size:5rem; cursor:pointer; text-align:center; margin-top:20px;">🔊</div>
        <h2 id="targetPhrase" style="text-align:center; margin:20px 0;">...</h2>
        <div id="dropZone" class="word-area"></div>
        <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        <button id="checkBtn" class="btn-main" style="margin-top:30px;">VERIFICAR</button>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// BANCO DE DADOS GLOBAL
const content = {
    English: {
        1: { name: "Nível 1: Padaria", words: { "bread": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "eat": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200" }, sentences: [{pt: "Eu como pão", ans: "i eat bread", parts: ["i", "eat", "bread", "the"]}] },
        2: { name: "Nível 2: Bebida", words: { "water": "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=200", "drink": "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=200" }, sentences: [{pt: "Eu bebo água", ans: "i drink water", parts: ["i", "drink", "water", "juice"]}] }
    },
    Spanish: {
        1: { name: "Nivel 1: El Pan", words: { "pan": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "como": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200" }, sentences: [{pt: "Eu como pão", ans: "yo como pan", parts: ["yo", "como", "pan", "el"]}] }
    },
    French: {
        1: { name: "Niveau 1: Le Pain", words: { "pain": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "mange": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200" }, sentences: [{pt: "Eu como pão", ans: "je mange du pain", parts: ["je", "mange", "du", "pain", "le"]}] },
        2: { name: "Niveau 2: Café", words: { "café": "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=200", "bois": "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=200" }, sentences: [{pt: "Eu bebo café", ans: "je bois du café", parts: ["je", "bois", "du", "café", "un"]}] }
    },
    Italian: {
        1: { name: "Livello 1: Il Pane", words: { "pane": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "mangio": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200" }, sentences: [{pt: "Eu como pão", ans: "io mangio pane", parts: ["io", "mangio", "pane", "il"]}] }
    }
};

let userData = { progress: { English:0, Spanish:0, French:0, Italian:0 }, currentLang: "English", hasLearned: false, username: "Estudante", streak: 0 };
let currentQ = []; let qIdx = 0; let userPhrase = []; let authMode = 'login';

// LÓGICA DE ANÚNCIO OBRIGATÓRIO
function showAd(callback) {
    const overlay = document.getElementById('adOverlay');
    const btn = document.getElementById('closeAdBtn');
    overlay.style.display = 'flex';
    let count = 5;
    btn.innerText = `Aguarde ${count}s...`;
    btn.classList.remove('ready');

    const timer = setInterval(() => {
        count--;
        if(count > 0) btn.innerText = `Aguarde ${count}s...`;
        else { clearInterval(timer); btn.innerText = "FECHAR ANÚNCIO ×"; btn.classList.add('ready'); }
    }, 1000);

    btn.onclick = () => { overlay.style.display = 'none'; callback(); };
}

window.toggleSettings = (s) => document.getElementById('settingsModal').style.display = s ? 'flex' : 'none';
window.handleLogout = () => signOut(auth);
window.toggleAuthMode = () => { authMode = (authMode === 'login') ? 'register' : 'login'; document.getElementById('regOnly').classList.toggle('hidden', authMode === 'login'); };
const showView = (id) => { ['landingView', 'dashboardView', 'teachingView', 'practiceView'].forEach(v => document.getElementById(v).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); document.getElementById('mainHeader').classList.toggle('hidden', id === 'landingView'); };

const speak = (t) => { 
    const m = new SpeechSynthesisUtterance(t); 
    const langs = {English:'en-US', Spanish:'es-ES', French:'fr-FR', Italian:'it-IT'};
    m.lang = langs[userData.currentLang]; 
    window.speechSynthesis.speak(m); 
};

function updateUI() {
    const xp = userData.progress[userData.currentLang] || 0;
    const lvl = Math.floor(xp / 100) + 1;
    const langData = content[userData.currentLang] || content.English;
    const c = langData[lvl] || langData[1];
    
    document.getElementById('langTag').innerText = userData.currentLang.slice(0,2).toUpperCase();
    document.getElementById('levelLabel').innerText = c.name;
    document.getElementById('xpText').innerText = `${xp % 100} / 100 XP`;
    document.getElementById('mainProgress').style.width = `${xp % 100}%`;
    document.getElementById('streakVal').innerText = userData.streak;
    
    const btn = document.getElementById('actionBtn');
    btn.innerText = userData.hasLearned ? "COMEÇAR TAREFA" : "ESTUDAR PALAVRAS";
    btn.onclick = userData.hasLearned ? () => startPractice(c) : () => startTeaching(c);
}

function startTeaching(c) {
    showView('teachingView');
    const g = document.getElementById('teachGrid'); g.innerHTML = "";
    Object.keys(c.words).forEach(w => { g.innerHTML += `<div class="word-card" onclick="speak('${w}')"><img src="${c.words[w]}" class="word-img"><b>${w}</b></div>`; });
}

document.getElementById('confirmTeach').onclick = async () => {
    userData.hasLearned = true;
    await update(ref(db, 'users/'+auth.currentUser.uid), { hasLearned: true });
    updateUI(); showView('dashboardView');
};

function startPractice(c) { currentQ = c.sentences; qIdx = 0; showView('practiceView'); renderExercise(); }

function renderExercise() {
    const q = currentQ[qIdx]; userPhrase = [];
    document.getElementById('taskProgress').style.width = `${(qIdx/currentQ.length)*100}%`;
    document.getElementById('targetPhrase').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    const b = document.getElementById('wordBank'); b.innerHTML = "";
    q.parts.sort(()=>Math.random()-0.5).forEach(w => {
        const c = document.createElement('div'); c.className = "chip"; c.innerText = w;
        c.onclick = () => { if(!c.classList.contains('used')){ userPhrase.push(w); document.getElementById('dropZone').innerHTML += `<span>${w} </span>`; c.classList.add('used'); speak(w); }};
        b.appendChild(c);
    });
}

document.getElementById('checkBtn').onclick = async () => {
    if(userPhrase.join(" ").toLowerCase().trim() === currentQ[qIdx].ans) {
        const xp = userData.progress[userData.currentLang] || 0;
        const oldLvl = Math.floor(xp / 100);
        userData.progress[userData.currentLang] += 20;
        if(Math.floor(userData.progress[userData.currentLang]/100) > oldLvl) userData.hasLearned = false;
        
        await update(ref(db, 'users/'+auth.currentUser.uid), userData);
        qIdx++;
        if(qIdx < currentQ.length) renderExercise();
        else showAd(() => { showView('dashboardView'); updateUI(); }); // Roda o anúncio ao fim de cada tarefa
    } else { alert("Tente novamente!"); }
};

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/'+u.uid));
        if(s.exists()) userData = s.val();
        showView('dashboardView'); updateUI();
        onValue(ref(db, 'users'), snap => {
            const list = Object.values(snap.val() || {}).sort((a,b) => (b.progress[userData.currentLang]||0) - (a.progress[userData.currentLang]||0)).slice(0,5);
            document.getElementById('rankList').innerHTML = list.map((u, i) => `<div class="rank-item"><span>${i+1}. ${u.username}</span><b>${u.progress[userData.currentLang]||0} XP</b></div>`).join('');
        });
    } else showView('landingView');
});

document.getElementById('authBtn').onclick = async () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    try {
        if(authMode === 'register') {
            const r = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/'+r.user.uid), { ...userData, username: document.getElementById('username').value });
        } else await signInWithEmailAndPassword(auth, e, p);
    } catch(err) { alert(err.message); }
};

window.changeLanguage = async (l) => {
    userData.currentLang = l; userData.hasLearned = false;
    await update(ref(db, 'users/'+auth.currentUser.uid), { currentLang: l, hasLearned: false });
    updateUI(); toggleSettings(false);
};
</script>
</body>
</html>
