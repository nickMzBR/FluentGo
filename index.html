<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluentGo</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#222; color:#fff; text-align:center;}
header { display:flex; justify-content:space-between; padding:15px 25px; background:#1a1a1a;}
button, select, input { padding:8px; border-radius:8px; border:none; margin:5px;}
button { background:#2563EB; color:white; cursor:pointer;}
select, input { background:#333; color:white;}
.module { background:#2c2c2c; margin:15px auto; padding:15px; width:80%; border-radius:10px;}
.hidden { display:none; }
.disabled { opacity:0.5; pointer-events:none; }

/* Tela de parabéns */
#congratsModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:#fff; justify-content:center; align-items:center; flex-direction:column; font-size:1.5em; }
#congratsModal h1 { color:#2563EB; margin-bottom:20px; }
#congratsModal button { font-size:1em; padding:10px 20px; }
</style>
</head>
<body>

<header>
  <div>FluentGo</div>
  <div>
    <button id="settingsBtn" onclick="openSettings()">Configurações</button>
    <button id="logoutBtn" onclick="logout()">Sair</button>
  </div>
</header>

<div id="authSection">
  <h2>Entrar</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha"><br>
  <button onclick="register()">Criar Conta</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="appSection" class="hidden">
  <h2 id="currentLanguage"></h2>
  <h3>XP: <span id="xpDisplay">0</span></h3>
</div>

<div id="settingsSection" class="hidden">
  <h2>Configurações</h2>
  <select id="languageSelect">
    <option value="Ingles">Inglês</option>
    <option value="Espanhol">Espanhol</option>
    <option value="Japones">Japonês</option>
  </select>
  <br>
  <button onclick="saveLanguage()">Salvar</button>
  <button onclick="closeSettings()">Fechar</button>
</div>

<div id="adModal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;">
  <h2>Anúncio</h2>
  <p>Assista este anúncio para continuar!</p>
  <button onclick="closeAd()">Fechar Anúncio</button>
</div>

<div id="taskModal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#222; color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
  <h3 id="taskTitle"></h3>
  <div id="exerciseContainer"></div>
  <button id="nextQuestionBtn">Próxima Pergunta</button>
</div>

<!-- Tela de parabéns -->
<div id="congratsModal">
  <h1>Parabéns! 🎉</h1>
  <p>Você concluiu o curso de <span id="congratsLanguage"></span>!</p>
  <button onclick="closeCongrats()">Fechar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw",
  authDomain: "fluentgo-35024.firebaseapp.com",
  databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com",
  projectId: "fluentgo-35024",
  storageBucket: "fluentgo-35024.firebasestorage.app",
  messagingSenderId: "613715387990",
  appId: "1:613715387990:web:0345ade26374dd32d1fdf7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const authSection = document.getElementById("authSection");
const appSection = document.getElementById("appSection");
const settingsSection = document.getElementById("settingsSection");
const settingsBtn = document.getElementById("settingsBtn");
const logoutBtn = document.getElementById("logoutBtn");
const xpDisplay = document.getElementById("xpDisplay");
const taskModal = document.getElementById("taskModal");
const taskTitle = document.getElementById("taskTitle");
const exerciseContainer = document.getElementById("exerciseContainer");
const nextQuestionBtn = document.getElementById("nextQuestionBtn");
const adModal = document.getElementById("adModal");
const congratsModal = document.getElementById("congratsModal");
const congratsLanguage = document.getElementById("congratsLanguage");

settingsBtn.style.display="none";
logoutBtn.style.display="none";

let currentModule = 1;
let currentTask = 1;
let currentQuestion = 0;
let questionsPerTask = 5;
let totalModules = 10;
let totalTasks = 10;
let currentLanguage = "Ingles";
let user = null;

const exercisesTemplate = [
  {type:"translate", question:"Traduza 'Hello'", answer:"Olá"},
  {type:"multiple", question:"Qual é a tradução de 'Goodbye'?", options:["Tchau","Obrigado","Por favor"], answer:"Tchau"},
  {type:"order", question:"Ordene: 'I am Nick'", words:["I","Nick","am"], answer:["I","am","Nick"]},
  {type:"translate", question:"Traduza 'Thank you'", answer:"Obrigado"},
  {type:"multiple", question:"Qual é a tradução de 'Please'?", options:["Por favor","Desculpa","Oi"], answer:"Por favor"}
];

function getCurrentExercise(){
  return exercisesTemplate[currentQuestion];
}

function showExercise(){
  taskModal.classList.remove("hidden");
  const ex = getCurrentExercise();
  exerciseContainer.innerHTML="";
  taskTitle.innerText = `Módulo ${currentModule} - Tarefa ${currentTask} - Pergunta ${currentQuestion+1}`;

  if(ex.type==="translate"){
    const input = document.createElement("input");
    input.id="answerInput";
    input.placeholder="Sua resposta";
    exerciseContainer.appendChild(document.createTextNode(ex.question));
    exerciseContainer.appendChild(document.createElement("br"));
    exerciseContainer.appendChild(input);
  } else if(ex.type==="multiple"){
    exerciseContainer.appendChild(document.createTextNode(ex.question));
    exerciseContainer.appendChild(document.createElement("br"));
    ex.options.forEach(opt=>{
      const btn = document.createElement("button");
      btn.innerText=opt;
      btn.onclick=()=>checkAnswer(opt);
      exerciseContainer.appendChild(btn);
      exerciseContainer.appendChild(document.createElement("br"));
    });
  } else if(ex.type==="order"){
    exerciseContainer.appendChild(document.createTextNode(ex.question));
    exerciseContainer.appendChild(document.createElement("br"));
    ex.words.forEach(word=>{
      const btn = document.createElement("button");
      btn.innerText=word;
      btn.onclick=()=>selectWord(word);
      exerciseContainer.appendChild(btn);
    });
    document.selectedWords=[];
  }
}

function selectWord(word){
  const ex = getCurrentExercise();
  document.selectedWords.push(word);
  if(document.selectedWords.length===ex.words.length){
    checkAnswer(document.selectedWords);
  }
}

function checkAnswer(ans){
  const ex = getCurrentExercise();
  let correct=false;
  if(ex.type==="order") correct = JSON.stringify(ans)===JSON.stringify(ex.answer);
  else correct = ans.toLowerCase()===ex.answer.toLowerCase();

  alert(correct?"Correto!":"Errado! Resposta: "+ex.answer);

  set(ref(db, `users/${user.uid}/tasks/module${currentModule}-task${currentTask}-q${currentQuestion+1}`), ans);

  currentQuestion++;
  if(currentQuestion<questionsPerTask) showExercise();
  else { 
    get(ref(db,"users/"+user.uid+"/xp")).then(snap=>{
      let xp = snap.exists()? snap.val():0;
      set(ref(db,"users/"+user.uid+"/xp"), xp+10);
      xpDisplay.innerText=xp+10;
    });
    taskModal.classList.add("hidden");
    adModal.classList.remove("hidden");
  }
}

function closeAd(){
  adModal.classList.add("hidden");
  currentTask++;
  currentQuestion=0;

  if(currentTask <= totalTasks){
    showExercise();
  } else {
    currentModule++;
    currentTask=1;
    if(currentModule <= totalModules){
      showExercise();
    } else {
      // Curso finalizado
      congratsLanguage.innerText = currentLanguage;
      congratsModal.style.display="flex";
    }
  }
}

function closeCongrats(){
  congratsModal.style.display="none";
}

// Auth
window.register=function(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  createUserWithEmailAndPassword(auth,email,password).catch(e=>alert(e.message));
}

window.login=function(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  signInWithEmailAndPassword(auth,email,password).catch(e=>alert(e.message));
}

window.logout=function(){ signOut(auth); }

window.openSettings=function(){ settingsSection.classList.remove("hidden"); appSection.classList.add("hidden"); }
window.closeSettings=function(){ settingsSection.classList.add("hidden"); appSection.classList.remove("hidden"); }
window.saveLanguage=function(){
  currentLanguage=document.getElementById("languageSelect").value;
  set(ref(db,"users/"+user.uid+"/language"), currentLanguage).then(()=>closeSettings());
}

onAuthStateChanged(auth,(u)=>{
  if(u){
    user=u;
    authSection.classList.add("hidden");
    appSection.classList.remove("hidden");
    settingsBtn.style.display="inline-block";
    logoutBtn.style.display="inline-block";
    get(ref(db,"users/"+user.uid)).then(snapshot=>{
      const data=snapshot.exists()? snapshot.val():{};
      currentLanguage=data.language||"Ingles";
      document.getElementById("languageSelect").value=currentLanguage;
      if(!data.unlockedModules) set(ref(db,"users/"+user.uid+"/unlockedModules"),[1]);
      showExercise();
    });
  } else {
    user=null;
    authSection.classList.remove("hidden");
    appSection.classList.add("hidden");
    settingsBtn.style.display="none";
    logoutBtn.style.display="none";
  }
});

</script>
</body>
</html>
