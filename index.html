<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo | Aprenda Linguas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --streak: #FF4500; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #334155; margin-bottom: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.2rem; }
        .stat-badge { background: #000; padding: 4px 10px; border-radius: 10px; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 4px; }
        #landingView { text-align: center; padding-top: 60px; }
        button { padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; font-size: 1rem; }
        button:active { transform: scale(0.98); }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-success { background: var(--secondary); color: white; box-shadow: 0 4px 0 #059669; }
        .btn-ghost { background: transparent; color: #94a3b8; text-decoration: underline; margin-top: 10px; }
        .teach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .word-card { background: var(--card); border-radius: 20px; border: 2px solid #334155; overflow: hidden; }
        .word-img { width: 100%; height: 110px; object-fit: cover; }
        .word-area { min-height: 100px; border: 2px dashed #334155; border-radius: 20px; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2); }
        .chip { background: #334155; padding: 12px 18px; border-radius: 14px; border-bottom: 3px solid #1e293b; cursor: pointer; }
        .chip.used { opacity: 0.2; pointer-events: none; }
        .progress-bar { background: #334155; height: 10px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.5s; }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header class="hidden" id="mainHeader">
    <div class="logo">FLUENT<span>GO</span></div>
    <div style="display:flex; gap:8px;">
        <div class="stat-badge" style="color: var(--streak);">🔥 <span id="streakVal">0</span></div>
        <div class="stat-badge" style="color: var(--premium);">⭐ <span id="xpVal">0</span></div>
    </div>
</header>

<main id="landingView" class="container hidden">
    <h1 style="font-size:2.5rem; font-weight:900; line-height:1.1;">Domine o Inglês <br><span style="color:var(--secondary)">Visualmente</span></h1>
    <div id="authBox" class="card" style="margin-top:30px;">
        <div id="regOnly" class="hidden">
            <input type="text" id="username" placeholder="Nome de usuário" style="width:100%; padding:15px; border-radius:12px; border:1px solid #334155; background:#0F172A; color:white; margin-bottom:10px;">
        </div>
        <input type="email" id="email" placeholder="E-mail" style="width:100%; padding:15px; border-radius:12px; border:1px solid #334155; background:#0F172A; color:white; margin-bottom:10px;">
        <input type="password" id="password" placeholder="Senha" style="width:100%; padding:15px; border-radius:12px; border:1px solid #334155; background:#0F172A; color:white; margin-bottom:20px;">
        <button id="authBtn" class="btn-main">ENTRAR</button>
        <button id="toggleAuth" class="btn-ghost">Criar nova conta</button>
    </div>
</main>

<main id="dashboardView" class="container hidden">
    <div class="card">
        <h2 id="modLabel" style="margin:0;">Nível 1</h2>
        <div class="progress-bar"><div id="mainProgress" class="progress-fill"></div></div>
        <button id="actionBtn" class="btn-main" style="margin-top:10px;">CARREGANDO...</button>
    </div>
    <div class="card"><h3>Top Alunos</h3><div id="rankList"></div></div>
    <button onclick="signOut(auth)" class="btn-ghost" style="color:var(--error);">Sair da conta</button>
</main>

<main id="teachingView" class="container hidden">
    <h2>Dicionário Visual</h2>
    <div class="teach-grid" id="teachGrid"></div>
    <button id="confirmTeach" class="btn-success">ESTOU PRONTO!</button>
</main>

<main id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:2000; padding:20px;">
    <div class="progress-bar"><div id="taskProgress" class="progress-fill"></div></div>
    <div class="container">
        <div onclick="speak(currentQ[qIdx].ans)" style="font-size:4rem; cursor:pointer; margin-top:40px;">🔊</div>
        <h2 id="questionTxt" style="margin:20px 0;">...</h2>
        <div id="dropZone" class="word-area"></div>
        <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;"></div>
        <div id="feedback" style="margin:20px; font-weight:bold; height:20px;"></div>
        <button id="checkBtn" class="btn-main">VERIFICAR</button>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// SINTETIZADOR DE SOM (GERA ÁUDIO SEM ARQUIVOS EXTERNOS)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if(type === 'win') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
}

const imageLib = { "I": "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=200", "You": "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=200", "eat": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200", "drink": "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=200", "bread": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "water": "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=200", "coffee": "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=200" };
const vocab = { subjects: ["I", "You"], verbs: ["eat", "drink"], objects: ["bread", "water", "coffee"], pt: { "I":"Eu", "You":"Você", "eat":"como", "drink":"bebo", "bread":"pão", "water":"água", "coffee":"café" }};

let userData = { xp: 0, mod: 1, streak: 0, lastDate: "", hasLearned: false };
let currentQ = []; let qIdx = 0; let userPhrase = []; let authMode = 'login';

const showView = (id) => {
    ['landingView', 'dashboardView', 'teachingView', 'practiceView'].forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('mainHeader').classList.toggle('hidden', id === 'landingView');
};

const speak = (t) => { const m = new SpeechSynthesisUtterance(t); m.lang="en-US"; window.speechSynthesis.speak(m); };

document.getElementById('toggleAuth').onclick = () => {
    authMode = authMode === 'login' ? 'register' : 'login';
    document.getElementById('regOnly').classList.toggle('hidden', authMode === 'login');
    document.getElementById('authBtn').innerText = authMode === 'login' ? 'ENTRAR' : 'CRIAR CONTA';
};

document.getElementById('authBtn').onclick = async () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    try {
        if(authMode === 'register') {
            const r = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/'+r.user.uid), { ...userData, username: document.getElementById('username').value });
        } else { await signInWithEmailAndPassword(auth, e, p); }
    } catch(err) { alert(err.message); }
};

async function syncData(uId) {
    const snap = await get(ref(db, 'users/'+uId));
    if(snap.exists()) userData = snap.val();
    const hoje = new Date().toISOString().split('T')[0];
    const ontem = new Date(); ontem.setDate(ontem.getDate()-1);
    const ontemStr = ontem.toISOString().split('T')[0];
    if(userData.lastDate !== hoje) {
        userData.streak = (userData.lastDate === ontemStr) ? (userData.streak + 1) : 1;
        userData.lastDate = hoje;
        await update(ref(db, 'users/'+uId), { streak: userData.streak, lastDate: hoje });
    }
    updateUI();
}

function updateUI() {
    document.getElementById('xpVal').innerText = userData.xp;
    document.getElementById('streakVal').innerText = userData.streak;
    document.getElementById('modLabel').innerText = `Nível ${userData.mod}`;
    document.getElementById('mainProgress').style.width = `${userData.xp % 100}%`;
    const btn = document.getElementById('actionBtn');
    btn.innerText = userData.hasLearned ? "PRATICAR AGORA" : "ESTUDAR PALAVRAS";
    btn.onclick = userData.hasLearned ? startPractice : startTeaching;
}

function startTeaching() {
    showView('teachingView');
    const grid = document.getElementById('teachGrid'); grid.innerHTML = "";
    Object.keys(imageLib).forEach(word => {
        grid.innerHTML += `<div class="word-card" onclick="speak('${word}')"><img src="${imageLib[word]}" class="word-img"><div style="padding:10px;"><small style="color:#94a3b8">${vocab.pt[word]}</small><br><b>${word}</b></div></div>`;
    });
}

document.getElementById('confirmTeach').onclick = async () => {
    userData.hasLearned = true;
    await update(ref(db, 'users/'+auth.currentUser.uid), { hasLearned: true });
    showView('dashboardView'); updateUI();
};

function startPractice() {
    currentQ = [];
    for(let i=0; i<5; i++) {
        const s = vocab.subjects[Math.floor(Math.random()*2)], v = vocab.verbs[Math.floor(Math.random()*2)], o = vocab.objects[Math.floor(Math.random()*3)];
        currentQ.push({ pt: `${vocab.pt[s]} ${vocab.pt[v]} ${vocab.pt[o]}`, ans: `${s} ${v} ${o}`.toLowerCase(), words: [s, v, o, "a", "is"].sort(()=>Math.random()-0.5) });
    }
    qIdx = 0; showView('practiceView'); renderExercise();
}

function renderExercise() {
    const q = currentQ[qIdx];
    document.getElementById('taskProgress').style.width = `${(qIdx/5)*100}%`;
    document.getElementById('questionTxt').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    document.getElementById('feedback').innerText = "";
    userPhrase = [];
    const bank = document.getElementById('wordBank'); bank.innerHTML = "";
    q.words.forEach(w => {
        const b = document.createElement('div'); b.className = "chip"; b.innerText = w;
        b.onclick = () => { if(!b.classList.contains('used')) { userPhrase.push(w); document.getElementById('dropZone').innerHTML += `<span>${w} </span>`; b.classList.add('used'); speak(w); }};
        bank.appendChild(b);
    });
}

document.getElementById('checkBtn').onclick = async () => {
    if(userPhrase.join(" ").toLowerCase() === currentQ[qIdx].ans) {
        playSound('win'); // <--- SOM DE VITÓRIA
        document.getElementById('feedback').innerText = "✨ EXCELENTE!";
        userData.xp += 20; qIdx++;
        if(qIdx < 5) setTimeout(renderExercise, 1000);
        else {
            if(Math.floor(userData.xp/100)+1 > userData.mod) { userData.mod++; userData.hasLearned = false; }
            await update(ref(db, 'users/'+auth.currentUser.uid), userData);
            showView('dashboardView'); updateUI();
        }
    } else { 
        playSound('lose'); // <--- SOM DE ERRO
        document.getElementById('feedback').innerText = "❌ OPS, TENTE DE NOVO"; 
    }
};

onAuthStateChanged(auth, u => {
    document.getElementById('loader').classList.add('hidden');
    if(u) { syncData(u.uid); showView('dashboardView'); } else { showView('landingView'); }
});

onValue(ref(db, 'users/'), snap => {
    const r = Object.values(snap.val() || {}).sort((a,b)=>b.xp - a.xp).slice(0,5);
    document.getElementById('rankList').innerHTML = r.map((u,i)=>`<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #334155;"><span>${i+1}. ${u.username || 'User'}</span><b>${u.xp} XP</b></div>`).join('');
});
</script>
</body>
</html>
