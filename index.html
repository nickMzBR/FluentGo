<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluentGo | Pro</title>
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --premium: #FF9900; --danger: #EF4444; --bg: #121212; --card: #1E1E1E; }
        body { margin:0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #fff; text-align: center; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #000; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { padding: 14px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1em; }
        button:active { transform: scale(0.95); }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 10px; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-main:active { box-shadow: none; transform: translateY(4px); }
        .btn-ghost { background: #333; color: #ccc; width: 100%; margin-top: 10px; border: 1px solid #444; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #252525; padding: 12px; border-radius: 15px; border: 1px solid #333; font-size: 0.9em; }
        .progress-container { background: #333; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        input[type="text"] { background: #252525; border: 2px solid #444; padding: 15px; border-radius: 15px; color: white; font-size: 1.2em; text-align: center; width: 85%; outline: none; margin-bottom: 15px; }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

<canvas id="fxCanvas"></canvas>

<header>
    <div style="font-size: 1.4em; font-weight: 900;">FLUENT<span style="color:var(--primary)">GO</span></div>
    <div id="userMenu" class="hidden"><span id="userXpDisplay" style="color: var(--premium); font-weight: bold;">0 XP</span></div>
</header>

<div id="authSection" class="container">
    <div class="card" style="margin-top: 50px;">
        <h2>Aprenda grátis. Para sempre.</h2>
        <input type="email" id="email" placeholder="E-mail" style="width: 85%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #222; border: 1px solid #444; color: white;">
        <input type="password" id="password" placeholder="Senha" style="width: 85%; padding: 12px; margin-bottom: 20px; border-radius: 8px; background: #222; border: 1px solid #444; color: white;">
        <button id="loginBtn" class="btn-main">ENTRAR</button>
        <button id="registerBtn" class="btn-ghost">CRIAR CONTA</button>
    </div>
</div>

<div id="langOnboarding" class="container hidden">
    <div class="card">
        <h2>Escolha um curso:</h2>
        <button class="btn-ghost" style="border-color: var(--primary)" onclick="switchLanguage('Ingles')">🇺🇸 Inglês</button>
        <button class="btn-ghost" style="border-color: var(--secondary)" onclick="switchLanguage('Espanhol')">🇪🇸 Espanhol</button>
        <button class="btn-ghost" style="border-color: #FF0055" onclick="switchLanguage('Japones')">🇯🇵 Japonês</button>
    </div>
</div>

<div id="appSection" class="container hidden">
    <div class="stats-grid">
        <div class="stat-box">🌍 <b id="currentLangLabel">---</b></div>
        <div class="stat-box">🔥 Combo: <b id="comboLabel">0</b></div>
    </div>
    <div class="card">
        <h3 id="moduleLabel">Módulo 1</h3>
        <div class="progress-container"><div id="mainProgress" class="progress-fill"></div></div>
        <button id="startBtn" class="btn-main">CONTINUAR ESTUDO</button>
    </div>
    <button id="configBtn" class="btn-ghost">⚙️ Trocar de Curso</button>
    <button id="logoutBtn" class="btn-ghost" style="color: var(--danger)">Sair da Conta</button>
</div>

<div id="studyModal" class="container hidden">
    <div class="card" style="margin-top: 50px;">
        <h4 style="color:var(--premium)">ESTUDE</h4>
        <h1 id="studyWord">...</h1>
        <h2 id="studyTranslation" style="color:var(--secondary)">...</h2>
        <button id="nextStudyBtn" class="btn-main">ESTUDEI</button>
    </div>
</div>

<div id="taskModal" class="hidden" style="position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column;">
    <div style="padding: 20px;"><div class="progress-container"><div id="taskProgress" class="progress-fill"></div></div></div>
    <div class="container" style="flex:1; display:flex; flex-direction:column; justify-content:center;">
        <h1 id="questionDisplay">...</h1>
        <div id="exerciseArea"></div>
        <div id="feedback" style="margin-top:20px; font-weight:bold;"></div>
        <button id="checkBtn" class="btn-main">VERIFICAR</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let userData = { xp: 0, combo: 0, currentLang: "", progress: {} };
let activeLesson = [];
let qIdx = 0;

const showSection = (id) => {
    ["authSection", "appSection", "taskModal", "langOnboarding", "studyModal"].forEach(s => document.getElementById(s).classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
};

// --- FIX: TROCA DE LINGUA SEM BUG ---
window.switchLanguage = async (lang) => {
    userData.currentLang = lang;
    if (!userData.progress) userData.progress = {};
    if (!userData.progress[lang]) userData.progress[lang] = { mod: 1 };
    
    await update(ref(db, 'users/' + auth.currentUser.uid), userData);
    updateUI();
    showSection("appSection");
};

function updateUI() {
    const lang = userData.currentLang;
    const mod = (userData.progress && userData.progress[lang]) ? userData.progress[lang].mod : 1;
    
    document.getElementById("userXpDisplay").innerText = `${userData.xp || 0} XP`;
    document.getElementById("currentLangLabel").innerText = lang || "---";
    document.getElementById("comboLabel").innerText = userData.combo || 0;
    document.getElementById("moduleLabel").innerText = `Módulo ${mod}`;
    document.getElementById("mainProgress").style.width = `${(mod - 1) * 10}%`;
}

// (Lógica de curso simplificada para exemplo, mantenha a sua anterior se preferir)
const courseData = { 
    Ingles: { M1: [{q:"Olá", a:["hello"], type:"input"}] },
    Espanhol: { M1: [{q:"Olá", a:["hola"], type:"input"}] },
    Japones: { M1: [{q:"Olá", a:["konnichiwa"], type:"input"}] }
};

window.startLesson = () => {
    const lang = userData.currentLang;
    const mod = userData.progress[lang].mod;
    activeLesson = courseData[lang]["M"+mod] || courseData[lang]["M1"];
    qIdx = 0;
    showStudy();
};

function showStudy() {
    showSection("studyModal");
    const q = activeLesson[qIdx];
    document.getElementById("studyWord").innerText = q.q;
    document.getElementById("studyTranslation").innerText = q.a[0].toUpperCase();
}

document.getElementById("nextStudyBtn").onclick = () => { showSection("taskModal"); renderTask(); };

function renderTask() {
    const q = activeLesson[qIdx];
    document.getElementById("questionDisplay").innerText = q.q;
    document.getElementById("exerciseArea").innerHTML = `<input type="text" id="ansInput" placeholder="Resposta...">`;
    document.getElementById("ansInput").focus();
}

document.getElementById("checkBtn").onclick = async () => {
    const ans = document.getElementById("ansInput").value.toLowerCase();
    if(activeLesson[qIdx].a.includes(ans)) {
        userData.xp += 10;
        userData.progress[userData.currentLang].mod++;
        await update(ref(db, 'users/' + auth.currentUser.uid), userData);
        updateUI();
        showSection("appSection");
        spawnParticles(window.innerWidth/2, window.innerHeight/2, "#10B981");
    } else {
        alert("Errado!");
    }
};

document.getElementById("loginBtn").onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("registerBtn").onclick = () => createUserWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("logoutBtn").onclick = () => signOut(auth);
document.getElementById("configBtn").onclick = () => showSection("langOnboarding");
document.getElementById("startBtn").onclick = startLesson;

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/' + u.uid));
        if(s.exists()) {
            userData = s.val();
            if(!userData.currentLang) showSection("langOnboarding");
            else showSection("appSection");
        } else {
            userData = { xp: 0, combo: 0, currentLang: "", progress: {} };
            showSection("langOnboarding");
        }
        document.getElementById("userMenu").classList.remove("hidden");
        updateUI();
    } else {
        showSection("authSection");
        document.getElementById("userMenu").classList.add("hidden");
    }
});

// FX Simples
const canvas = document.getElementById("fxCanvas"), ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let parts = [];
function spawnParticles(x,y,c){ for(let i=0;i<20;i++) parts.push({x,y,dx:(Math.random()-0.5)*10,dy:(Math.random()-0.5)*10,life:1,c}); }
function renderFX(){ ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach((p,i)=>{ ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill(); p.x+=p.dx; p.y+=p.dy; p.life-=0.02; if(p.life<=0) parts.splice(i,1); }); requestAnimationFrame(renderFX); }
renderFX();
</script>
</body>
</html>
