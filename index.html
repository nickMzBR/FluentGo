<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo Pro | v11 Estável</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .container { flex: 1; padding: 15px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; width: 100%; position: relative; }
        .hidden { display: none !important; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; }
        
        button { padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; text-transform: uppercase; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        
        .btn-check { background: var(--primary); color: white; box-shadow: 0 5px 0 #1D4ED8; }
        .btn-next { background: var(--secondary) !important; color: white !important; box-shadow: 0 5px 0 #059669 !important; }
        .btn-wrong { background: var(--error) !important; color: white !important; box-shadow: 0 5px 0 #991B1B !important; }

        .word-area { min-height: 110px; border: 2px dashed #475569; border-radius: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; background: rgba(255,255,255,0.02); margin: 20px 0; }
        .area-correct { background: rgba(16, 185, 129, 0.15); border-color: var(--secondary); border-style: solid; }
        .area-wrong { background: rgba(239, 68, 68, 0.15); border-color: var(--error); border-style: solid; }

        .chip { background: #334155; padding: 12px 16px; border-radius: 14px; font-weight: 700; color: white; border: 1px solid #475569; font-size: 16px; box-shadow: 0 3px 0 #0F172A; }
        .chip.used { opacity: 0.15; pointer-events: none; }

        nav { background: #1E293B; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<header id="mainHeader" class="hidden">
    <div style="font-weight:900; letter-spacing: 1px;">FLUENTGO</div>
    <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="userXP">0</span></div>
</header>

<main id="homeView" class="container hidden">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
        <div class="card">
            <h2 id="levelTxt" style="font-size: 1.5rem; margin-bottom: 5px;">Nível 1</h2>
            <p id="taskTxt" style="color: #94a3b8; margin-bottom: 25px;">Tarefa 1 de 10</p>
            <button id="startBtn" class="btn-check">PRATICAR TAREFA</button>
        </div>
    </div>
</main>

<div id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display: flex; flex-direction: column;">
    <div class="container">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom: 20px;">
            <button onclick="closePractice()" style="width:40px; background:none; font-size:24px; box-shadow:none; padding: 0;">✕</button>
            <div style="background:#334155; flex:1; height:10px; border-radius:10px; overflow:hidden;">
                <div id="innerBar" style="width:0%; height:100%; background:var(--secondary); transition:0.4s;"></div>
            </div>
        </div>

        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
            <h2 id="targetPhrase" style="text-align:center; font-size:1.8rem; font-weight:900; margin-bottom: 10px;">...</h2>
            <div id="dropZone" class="word-area"></div>
            <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        </div>

        <div style="padding: 20px 0;">
            <div id="feedbackText" style="text-align:center; margin-bottom:15px; font-weight:800; min-height:24px; font-size: 1.1rem;"></div>
            <button id="actionBtn" class="btn-check">VERIFICAR</button>
        </div>
    </div>
</div>

<nav id="mainNav" class="hidden">
    <div onclick="showTab('homeView')" style="font-size: 24px; cursor:pointer;">🏠</div>
    <div style="font-size: 24px; opacity: 0.2;">🏆</div>
    <div style="font-size: 24px; opacity: 0.2;">⚙️</div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const phrases = [
    {pt: "O carro é azul", en: "the car is blue"},
    {pt: "Eu bebo leite", en: "i drink milk"},
    {pt: "A maçã é vermelha", en: "the apple is red"},
    {pt: "O gato dorme", en: "the cat sleeps"},
    {pt: "Eu tenho um livro", en: "i have a book"}
];

let userData = { xp: 0, lvl: 1, task: 1 };
let currentQ = [];
let qIdx = 0;
let selection = [];
let state = "CHECK"; // CHECK ou NEXT

function updateUI() {
    document.getElementById('userXP').innerText = userData.xp || 0;
    document.getElementById('levelTxt').innerText = `Nível ${userData.lvl || 1}`;
    document.getElementById('taskTxt').innerText = `Tarefa ${userData.task || 1} de 10`;
}

document.getElementById('startBtn').onclick = () => {
    qIdx = 0;
    currentQ = [...phrases].sort(() => 0.5 - Math.random()).slice(0, 5);
    document.getElementById('practiceView').classList.remove('hidden');
    loadQuestion();
};

function loadQuestion() {
    state = "CHECK";
    selection = [];
    const q = currentQ[qIdx];
    
    // Reset visual
    const btn = document.getElementById('actionBtn');
    btn.innerText = "VERIFICAR";
    btn.className = "btn-check";
    document.getElementById('feedbackText').innerText = "";
    document.getElementById('dropZone').className = "word-area";
    document.getElementById('dropZone').innerHTML = "";
    document.getElementById('innerBar').style.width = `${(qIdx / 5) * 100}%`;
    document.getElementById('targetPhrase').innerText = q.pt;
    
    const bank = document.getElementById('wordBank');
    bank.innerHTML = "";
    let words = [...q.en.split(" "), "is", "a", "the"].sort(() => Math.random() - 0.5);
    
    words.forEach(w => {
        const b = document.createElement('button');
        b.className = "chip"; b.innerText = w;
        b.onclick = () => {
            if(state !== "CHECK") return;
            selection.push(w);
            b.classList.add('used');
            const span = document.createElement('span'); span.className = "chip"; span.innerText = w;
            document.getElementById('dropZone').appendChild(span);
        };
        bank.appendChild(b);
    });
}

document.getElementById('actionBtn').onclick = function() {
    if(state === "CHECK") {
        const guess = selection.join(" ").toLowerCase().trim();
        const correct = currentQ[qIdx].en.toLowerCase().trim();
        const zone = document.getElementById('dropZone');

        if(guess === correct) {
            this.innerText = "CONTINUAR";
            this.className = "btn-next";
            zone.classList.add('area-correct');
            document.getElementById('feedbackText').innerText = "Muito bem! ✨";
            document.getElementById('feedbackText').style.color = "var(--secondary)";
        } else {
            this.innerText = "ENTENDI";
            this.className = "btn-wrong";
            zone.classList.add('area-wrong');
            document.getElementById('feedbackText').innerText = "Resposta: " + correct;
            document.getElementById('feedbackText').style.color = "var(--error)";
        }
        state = "NEXT";
    } else {
        qIdx++;
        if(qIdx < 5) {
            loadQuestion();
        } else {
            completeTask();
        }
    }
};

async function completeTask() {
    userData.xp = (userData.xp || 0) + 50;
    userData.task = (userData.task || 0) + 1;
    if(userData.task > 10) { userData.task = 1; userData.lvl = (userData.lvl || 0) + 1; }
    
    if(auth.currentUser) {
        await update(ref(db, 'users/'+auth.currentUser.uid), userData);
    }
    document.getElementById('practiceView').classList.add('hidden');
    updateUI();
}

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/'+u.uid));
        if(s.exists()) userData = s.val();
        else await set(ref(db, 'users/'+u.uid), userData);
        
        document.getElementById('mainHeader').classList.remove('hidden');
        document.getElementById('homeView').classList.remove('hidden');
        document.getElementById('mainNav').classList.remove('hidden');
        updateUI();
    }
});

window.closePractice = () => document.getElementById('practiceView').classList.add('hidden');
window.showTab = (id) => {
    document.getElementById('homeView').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
};
</script>
</body>
</html>
