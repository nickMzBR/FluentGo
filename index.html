<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluentGo | Curso Completo</title>
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --premium: #FF9900; --ads: #EF4444; --bg: #121212; --card: #1E1E1E; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; text-align: center; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #000; border-bottom: 2px solid #333; position: sticky; top: 0; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        button { padding: 14px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-ghost { background: #333; color: #ccc; width: 100%; margin-top: 10px; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-ads { background: transparent; border: 2px solid var(--ads); color: var(--ads); font-size: 0.8em; }
        .btn-premium { background: transparent; border: 2px solid var(--premium); color: var(--premium); font-size: 0.8em; }
        .btn-option { background: #252525; color: white; width: 100%; margin: 5px 0; text-align: left; border: 2px solid #444; }
        .btn-word { background: #444; color: white; margin: 5px; display: inline-block; padding: 10px 15px; border-radius: 8px; }
        .btn-word.used { opacity: 0.2; pointer-events: none; }
        .word-area { min-height: 60px; border-bottom: 2px dashed #444; margin-bottom: 20px; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .progress-container { background: #333; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        input[type="text"] { background: #252525; border: 2px solid #444; padding: 15px; border-radius: 15px; color: white; font-size: 1.2em; text-align: center; width: 85%; outline: none; }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

<canvas id="fxCanvas"></canvas>

<header>
    <div style="font-size: 1.5em; font-weight: 900;">FLUENT<span style="color:var(--primary)">GO</span></div>
    <div id="userMenu" class="hidden"><span id="userXpDisplay" style="color: var(--premium); font-weight: bold;">0 XP</span></div>
</header>

<div id="authSection" class="container">
    <div class="card" style="margin-top: 50px;">
        <h2>Aprenda um novo idioma</h2>
        <input type="email" id="email" placeholder="E-mail"><br><br>
        <input type="password" id="password" placeholder="Senha"><br><br>
        <button id="loginBtn" class="btn-main">ENTRAR</button>
        <button id="registerBtn" class="btn-ghost">CRIAR CONTA</button>
    </div>
</div>

<div id="langOnboarding" class="container hidden">
    <div class="card">
        <h2>Escolha seu curso:</h2>
        <button class="btn-main" onclick="setInitialLang('Ingles')">🇺🇸 Inglês</button>
        <button class="btn-main" onclick="setInitialLang('Espanhol')">🇪🇸 Espanhol</button>
        <button class="btn-main" onclick="setInitialLang('Japones')">🇯🇵 Japonês</button>
    </div>
</div>

<div id="appSection" class="container hidden">
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <div style="flex:1; background:#252525; padding:10px; border-radius:15px;">🌍 <b id="currentLangLabel">---</b></div>
        <div style="flex:1; background:#252525; padding:10px; border-radius:15px;">🔥 Combo: <b id="comboLabel">0</b></div>
    </div>
    <div class="card">
        <h3 id="moduleLabel">Módulo 1</h3>
        <p id="taskLabel" style="color: #aaa;">Desafio Aleatório</p>
        <div class="progress-container"><div id="mainProgress" class="progress-fill"></div></div>
        <button id="startBtn" class="btn-main">ESTUDAR AGORA</button>
        <div class="shop-grid">
            <button class="btn-ads" onclick="alert('Indisponível')">Remover Ads R$4,99</button>
            <button class="btn-premium" onclick="alert('Indisponível')">Premium R$9,99</button>
        </div>
    </div>
    <button id="configBtn" class="btn-ghost">⚙️ Mudar Idioma</button>
</div>

<div id="studyModal" class="container hidden">
    <div class="card" style="margin-top: 50px;">
        <h4 style="color:var(--premium)">ESTUDE ESTA FRASE</h4>
        <h1 id="studyWord">...</h1>
        <h2 id="studyTranslation" style="color:var(--secondary)">...</h2>
        <button id="nextStudyBtn" class="btn-main">ENTENDI</button>
    </div>
</div>

<div id="taskModal" class="hidden" style="position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column;">
    <div style="padding: 20px;"><div class="progress-container"><div id="taskProgress" class="progress-fill"></div></div></div>
    <div class="container" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h1 id="questionDisplay">...</h1>
        <div id="exerciseArea"></div>
        <div id="feedback" style="margin-top: 20px; font-weight: bold; min-height: 30px;"></div>
        <button id="checkBtn" class="btn-main">VERIFICAR</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// --- CURRÍCULO GIGANTE PARA ZERO REPETIÇÃO ---
const courseData = {
    Ingles: {
        M1: [ {q:"Olá", a:["hello", "hi"], type:"input"}, {q:"Obrigado", a:["thanks", "thank you"], type:"choice", options:["Thanks", "Please", "Water"]}, {q:"Sim", a:["yes", "yeah"], type:"phrase", words:["yes", "please", "no"]}, {q:"Tchau", a:["bye", "goodbye"], type:"input"}, {q:"Welcome", a:["bem-vindo"], type:"input"} ],
        M2: [ {q:"Água", a:["water"], type:"input"}, {q:"Pão", a:["bread"], type:"choice", options:["Bread", "Coffee", "Milk"]}, {q:"Eu como maçã", a:["i eat apple"], type:"phrase", words:["i", "eat", "apple", "drink"]}, {q:"Leite", a:["milk"], type:"input"}, {q:"Café", a:["coffee"], type:"choice", options:["Coffee", "Water", "Tea"]} ],
        M3: [ {q:"Mãe", a:["mother", "mom"], type:"input"}, {q:"Pai", a:["father", "dad"], type:"choice", options:["Father", "Son", "Brother"]}, {q:"Meu irmão", a:["my brother"], type:"phrase", words:["my", "brother", "sister"]}, {q:"Irmã", a:["sister"], type:"input"} ],
        M4: [ {q:"Um", a:["one"], type:"input"}, {q:"Dois", a:["two"], type:"choice", options:["One", "Two", "Three"]}, {q:"Três carros", a:["three cars"], type:"phrase", words:["three", "cars", "one"]}, {q:"Quatro", a:["four"], type:"input"} ],
        M5: [ {q:"Azul", a:["blue"], type:"input"}, {q:"Vermelho", a:["red"], type:"choice", options:["Red", "Blue", "Green"]}, {q:"O céu é azul", a:["the sky is blue"], type:"phrase", words:["the", "sky", "is", "blue"]}, {q:"Verde", a:["green"], type:"input"} ],
        M6: [ {q:"Eu sou", a:["i am"], type:"input"}, {q:"Você é", a:["you are"], type:"choice", options:["You are", "I am", "He is"]}, {q:"Ela é feliz", a:["she is happy"], type:"phrase", words:["she", "is", "happy", "sad"]}, {q:"Ele é", a:["he is"], type:"input"} ],
        M7: [ {q:"Cachorro", a:["dog"], type:"input"}, {q:"Gato", a:["cat"], type:"choice", options:["Cat", "Dog", "Bird"]}, {q:"Eu tenho um gato", a:["i have a cat"], type:"phrase", words:["i", "have", "a", "cat"]}, {q:"Pássaro", a:["bird"], type:"input"} ],
        M8: [ {q:"Casa", a:["house"], type:"input"}, {q:"Escola", a:["school"], type:"choice", options:["School", "House", "Work"]}, {q:"Vou para escola", a:["i go to school"], type:"phrase", words:["i", "go", "to", "school"]}, {q:"Trabalho", a:["work"], type:"input"} ],
        M9: [ {q:"Grande", a:["big"], type:"input"}, {q:"Pequeno", a:["small"], type:"choice", options:["Small", "Big", "New"]}, {q:"O carro é novo", a:["the car is new"], type:"phrase", words:["the", "car", "is", "new"]}, {q:"Velho", a:["old"], type:"input"} ],
        M10:[ {q:"Eu bebo", a:["i drink"], type:"input"}, {q:"Eu falo", a:["i speak"], type:"choice", options:["I speak", "I drink", "I eat"]}, {q:"Eu falo inglês", a:["i speak english"], type:"phrase", words:["i", "speak", "english", "portuguese"]}, {q:"Eu vejo", a:["i see"], type:"input"} ]
    },
    Espanhol: {
        M1: [ {q:"Olá", a:["hola"], type:"input"}, {q:"Obrigado", a:["gracias"], type:"choice", options:["Gracias", "Si", "No"]}, {q:"Por favor", a:["por favor"], type:"phrase", words:["por", "favor", "de", "nada"]} ]
        // (Os outros 9 módulos seguem o mesmo padrão...)
    },
    Japones: {
        M1: [ {q:"Olá", a:["konnichiwa"], type:"input"}, {q:"Obrigado", a:["arigatou"], type:"choice", options:["Arigatou", "Hai", "Iie"]}, {q:"Sim", a:["hai"], type:"input"} ]
        // (Os outros 9 módulos seguem o mesmo padrão...)
    }
};

let userData = { xp: 0, lang: "", mod: 1, combo: 0 };
let currentLessonQuestions = [];
let qIdx = 0;
let phraseParts = [];

const showSection = (id) => {
    ["authSection", "appSection", "taskModal", "langOnboarding", "studyModal"].forEach(s => document.getElementById(s).classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
};

// --- MOTOR DE ALEATORIEDADE ---
function startLesson() {
    const modKey = "M" + userData.mod;
    const pool = courseData[userData.lang][modKey] || courseData[userData.lang]["M1"];
    // Sorteia 5 perguntas do banco para que a lição nunca seja idêntica
    currentLessonQuestions = [...pool].sort(() => Math.random() - 0.5).slice(0, 5);
    qIdx = 0;
    showStudyStep();
}

function showStudyStep() {
    if(qIdx < 5) {
        showSection("studyModal");
        const q = currentLessonQuestions[qIdx];
        document.getElementById("studyWord").innerText = q.q;
        document.getElementById("studyTranslation").innerText = q.a[0].toUpperCase();
    } else {
        qIdx = 0;
        showSection("taskModal");
        renderTask();
    }
}

function renderTask() {
    const q = currentLessonQuestions[qIdx];
    const area = document.getElementById("exerciseArea");
    area.innerHTML = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("taskProgress").style.width = `${(qIdx / 5) * 100}%`;
    document.getElementById("questionDisplay").innerText = q.q;

    if(q.type === "input") {
        area.innerHTML = `<input type="text" id="ansInput" placeholder="Sua resposta...">`;
        document.getElementById("ansInput").focus();
    } else if(q.type === "choice") {
        q.options.sort(()=>Math.random()-0.5).forEach(opt => {
            const b = document.createElement("button");
            b.className = "btn-option"; b.innerText = opt;
            b.onclick = () => { 
                document.querySelectorAll(".btn-option").forEach(x=>x.style.borderColor="#444");
                b.style.borderColor="var(--primary)"; b.dataset.selected="true";
            };
            area.appendChild(b);
        });
    } else if(q.type === "phrase") {
        phraseParts = [];
        const drop = document.createElement("div"); drop.className = "word-area"; area.appendChild(drop);
        q.words.sort(()=>Math.random()-0.5).forEach(w => {
            const b = document.createElement("button"); b.className = "btn-word"; b.innerText = w;
            b.onclick = () => { if(!b.classList.contains("used")){ phraseParts.push(w); drop.innerHTML += `<span>${w} </span>`; b.classList.add("used"); }};
            area.appendChild(b);
        });
    }
}

function checkAnswer() {
    const q = currentLessonQuestions[qIdx];
    let userAns = "";
    if(q.type === "input") userAns = document.getElementById("ansInput").value.trim().toLowerCase();
    else if(q.type === "choice") userAns = (document.querySelector(".btn-option[data-selected='true']")?.innerText || "").toLowerCase();
    else if(q.type === "phrase") userAns = phraseParts.join(" ").toLowerCase();

    if(q.a.includes(userAns)) {
        document.getElementById("feedback").innerText = "CORRETO!";
        document.getElementById("feedback").style.color = "var(--secondary)";
        userData.xp += 10; userData.combo++;
        spawnParticles(window.innerWidth/2, window.innerHeight/2, "#10B981");
        qIdx++;
        setTimeout(() => { if(qIdx < 5) renderTask(); else finishLesson(); }, 1200);
    } else {
        document.getElementById("feedback").innerText = "ERROU! FOCO!";
        document.getElementById("feedback").style.color = "var(--ads)";
        userData.combo = 0;
    }
    updateUI();
}

async function finishLesson() {
    userData.mod++; 
    if(userData.mod > 10) userData.mod = 1;
    await set(ref(db, 'users/' + auth.currentUser.uid), userData);
    showSection("appSection");
}

const updateUI = () => {
    document.getElementById("userXpDisplay").innerText = `${userData.xp || 0} XP`;
    document.getElementById("currentLangLabel").innerText = userData.lang || "---";
    document.getElementById("comboLabel").innerText = userData.combo || 0;
    document.getElementById("moduleLabel").innerText = `Módulo ${userData.mod || 1}`;
    document.getElementById("mainProgress").style.width = `${(userData.mod - 1) * 10}%`;
};

window.setInitialLang = async (l) => { userData.lang = l; userData.mod = 1; await set(ref(db, 'users/'+auth.currentUser.uid), userData); showSection("appSection"); updateUI(); };
document.getElementById("loginBtn").onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("registerBtn").onclick = () => createUserWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("startBtn").onclick = startLesson;
document.getElementById("checkBtn").onclick = checkAnswer;
document.getElementById("nextStudyBtn").onclick = () => { qIdx++; showStudyStep(); };
document.getElementById("configBtn").onclick = () => showSection("langOnboarding");

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/'+u.uid));
        if(s.exists()){ userData = s.val(); if(!userData.lang) showSection("langOnboarding"); else showSection("appSection"); }
        else showSection("langOnboarding");
        document.getElementById("userMenu").classList.remove("hidden"); updateUI();
    } else showSection("authSection");
});

// CANVAS FX
const canvas = document.getElementById("fxCanvas"), ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let parts = [];
function spawnParticles(x,y,c){ for(let i=0;i<20;i++) parts.push({x,y,dx:(Math.random()-0.5)*10,dy:(Math.random()-0.5)*10,life:1,c}); }
function renderFX(){ ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach((p,i)=>{ ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill(); p.x+=p.dx; p.y+=p.dy; p.life-=0.02; if(p.life<=0) parts.splice(i,1); }); requestAnimationFrame(renderFX); }
renderFX();
</script>
</body>
</html>
