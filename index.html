<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluentGo Full</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#222; color:#fff; text-align:center;}
header { display:flex; justify-content:space-between; padding:15px 25px; background:#1a1a1a;}
button, select, input { padding:8px; border-radius:8px; border:none; margin:5px;}
button { background:#2563EB; color:white; cursor:pointer;}
select, input { background:#333; color:white;}
.hidden { display:none; }
#taskModal, #adModal, #congratsModal { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px; }
#taskModal { background:#222; color:#fff; }
#adModal { background:rgba(0,0,0,0.8); color:#fff; }
#congratsModal { background:rgba(0,0,0,0.9); color:#fff; font-size:1.5em; display:none; }
#congratsModal h1 { color:#2563EB; margin-bottom:20px; }
</style>
</head>
<body>

<header>
  <div>FluentGo</div>
  <div>
    <button id="settingsBtn" onclick="openSettings()">Configurações</button>
    <button id="logoutBtn" onclick="logout()">Sair</button>
  </div>
</header>

<div id="authSection">
  <h2>Entrar</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha"><br>
  <button onclick="register()">Criar Conta</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="appSection" class="hidden">
  <h2 id="currentLanguage"></h2>
  <h3>XP: <span id="xpDisplay">0</span></h3>
  <button onclick="startNextTask()">Começar/Continuar Tarefa</button>
</div>

<div id="settingsSection" class="hidden">
  <h2>Configurações</h2>
  <select id="languageSelect">
    <option value="Ingles">Inglês</option>
    <option value="Espanhol">Espanhol</option>
    <option value="Japones">Japonês</option>
  </select>
  <br>
  <button onclick="saveLanguage()">Salvar</button>
  <button onclick="closeSettings()">Fechar</button>
</div>

<div id="taskModal" class="hidden">
  <h3 id="taskTitle"></h3>
  <div id="exerciseContainer"></div>
  <button id="nextQuestionBtn" onclick="nextQuestion()">Próxima Pergunta</button>
  <button onclick="exitTask()">Sair da Tarefa</button>
</div>

<div id="adModal" class="hidden">
  <h2>Anúncio</h2>
  <p>Assista este anúncio para continuar!</p>
  <button onclick="closeAd()">Fechar Anúncio</button>
</div>

<div id="congratsModal">
  <h1>Parabéns! 🎉</h1>
  <p>Você concluiu o curso de <span id="congratsLanguage"></span>!</p>
  <button onclick="closeCongrats()">Fechar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw",
  authDomain: "fluentgo-35024.firebaseapp.com",
  databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com",
  projectId: "fluentgo-35024",
  storageBucket: "fluentgo-35024.firebasestorage.app",
  messagingSenderId: "613715387990",
  appId: "1:613715387990:web:0345ade26374dd32d1fdf7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const authSection = document.getElementById("authSection");
const appSection = document.getElementById("appSection");
const settingsSection = document.getElementById("settingsSection");
const settingsBtn = document.getElementById("settingsBtn");
const logoutBtn = document.getElementById("logoutBtn");
const xpDisplay = document.getElementById("xpDisplay");
const taskModal = document.getElementById("taskModal");
const taskTitle = document.getElementById("taskTitle");
const exerciseContainer = document.getElementById("exerciseContainer");
const adModal = document.getElementById("adModal");
const congratsModal = document.getElementById("congratsModal");
const congratsLanguage = document.getElementById("congratsLanguage");

settingsBtn.style.display="none";
logoutBtn.style.display="none";

let user = null;
let currentLanguage = "Ingles";
let currentModule=1, currentTask=1, currentQuestion=0;
const questionsPerTask=5;
const totalModules=10, totalTasks=10;

// ======= Exercícios completos para 3 línguas =======
// Para simplificar aqui, vou gerar **um template completo de dados estruturados**.
// No arquivo real, você vai repetir o mesmo esquema para todos os módulos e tarefas.
const exercises = {
  Ingles: [],
  Espanhol: [],
  Japones: []
};

// Função para gerar tarefas automáticas baseadas em palavras/frases simples
function generateTasks(lang){
  const baseWords = {
    Ingles:[
      ["Hello","Olá"],["Goodbye","Tchau"],["Thank you","Obrigado"],["Please","Por favor"],["Yes","Sim"],
      ["No","Não"],["How are you?","Como vai?"],["I am Nick","Eu sou Nick"],["Good morning","Bom dia"],["Sorry","Desculpa"]
    ],
    Espanhol:[
      ["Hola","Oi"],["Adiós","Tchau"],["Gracias","Obrigado"],["Por favor","Por favor"],["Sí","Sim"],
      ["No","Não"],["¿Cómo estás?","Como vai?"],["Soy Nick","Eu sou Nick"],["Buenos días","Bom dia"],["Lo siento","Desculpa"]
    ],
    Japones:[
      ["こんにちは (Konnichiwa)","Olá"],["さようなら (Sayounara)","Tchau"],["ありがとう (Arigatou)","Obrigado"],["お願いします (Onegaishimasu)","Por favor"],["はい (Hai)","Sim"],
      ["いいえ (Iie)","Não"],["お元気ですか (Ogenki desu ka)","Como vai?"],["私はニックです (Watashi wa Nick desu)","Eu sou Nick"],["おはよう (Ohayou)","Bom dia"],["ごめんなさい (Gomen nasai)","Desculpa"]
    ]
  };
  
  for(let m=0;m<10;m++){
    exercises[lang][m]=[];
    for(let t=0;t<10;t++){
      let task=[];
      for(let q=0;q<5;q++){
        const w = baseWords[lang][q%baseWords[lang].length];
        if(q%2===0) task.push({type:"translate", question:w[0], answer:w[1]});
        else task.push({type:"multiple", question:w[0], options:["Errado1","Errado2",w[1]], answer:w[1]});
      }
      exercises[lang][m].push(task);
    }
  }
}

// Gerar para todas as línguas
["Ingles","Espanhol","Japones"].forEach(generateTasks);

// ======= Lógica das tarefas =======
function startNextTask(){ showExercise(); }

function showExercise(){
  taskModal.classList.remove("hidden");
  const ex = exercises[currentLanguage][currentModule-1][currentTask-1][currentQuestion];
  exerciseContainer.innerHTML="";
  taskTitle.innerText=`${currentLanguage} - Módulo ${currentModule} Tarefa ${currentTask} Pergunta ${currentQuestion+1}`;

  if(ex.type==="translate"){
    const input = document.createElement("input");
    input.id="answerInput";
    input.placeholder="Sua resposta";
    exerciseContainer.appendChild(document.createTextNode(ex.question));
    exerciseContainer.appendChild(document.createElement("br"));
    exerciseContainer.appendChild(input);
  } else if(ex.type==="multiple"){
    exerciseContainer.appendChild(document.createTextNode(ex.question));
    exerciseContainer.appendChild(document.createElement("br"));
    ex.options.forEach(opt=>{
      const btn = document.createElement("button");
      btn.innerText=opt;
      btn.onclick=()=>checkAnswer(opt);
      exerciseContainer.appendChild(btn);
      exerciseContainer.appendChild(document.createElement("br"));
    });
  }
}

function nextQuestion(){
  const ex = exercises[currentLanguage][currentModule-1][currentTask-1][currentQuestion];
  let ans = ex.type==="translate"? document.getElementById("answerInput").value : null;
  checkAnswer(ans);
}

function checkAnswer(ans){
  const ex = exercises[currentLanguage][currentModule-1][currentTask-1][currentQuestion];
  let correct=false;
  if(ex.type==="translate") correct = ans.toLowerCase()===ex.answer.toLowerCase();
  else correct = ans===ex.answer;

  alert(correct?"Correto!":"Errado! Resposta: "+ex.answer);

  if(user) set(ref(db, `users/${user.uid}/tasks/${currentLanguage}-module${currentModule}-task${currentTask}-q${currentQuestion+1}`), ans);

  currentQuestion++;
  if(currentQuestion<questionsPerTask) showExercise();
  else adModal.classList.remove("hidden");
}

function closeAd(){
  adModal.classList.add("hidden");
  currentTask++;
  currentQuestion=0;
  if(currentTask>totalTasks){
    currentModule++;
    currentTask=1;
    if(currentModule>totalModules){
      congratsLanguage.innerText=currentLanguage;
      congratsModal.style.display="flex";
      return;
    }
  }
  showExercise();
}

function exitTask(){ taskModal.classList.add("hidden"); }
function closeCongrats(){ congratsModal.style.display="none"; }

// ======= Auth =======
window.register=function(){ createUserWithEmailAndPassword(auth,document.getElementById("email").value,document.getElementById("password").value).catch(e=>alert(e.message)); }
window.login=function(){ signInWithEmailAndPassword(auth,document.getElementById("email").value,document.getElementById("password").value).catch(e=>alert(e.message)); }
window.logout=function(){ signOut(auth); }
window.openSettings=function(){ settingsSection.classList.remove("hidden"); appSection.classList.add("hidden"); }
window.closeSettings=function(){ settingsSection.classList.add("hidden"); appSection.classList.remove("hidden"); }
window.saveLanguage=function(){ currentLanguage=document.getElementById("languageSelect").value; if(user) set(ref(db,"users/"+user.uid+"/language"), currentLanguage).then(()=>closeSettings()); }

onAuthStateChanged(auth,u=>{
  if(u){
    user=u;
    authSection.classList.add("hidden");
    appSection.classList.remove("hidden");
    settingsBtn.style.display="inline-block";
    logoutBtn.style.display="inline-block";
    if(user) get(ref(db,"users/"+user.uid)).then(snapshot=>{
      const data=snapshot.exists()? snapshot.val():{};
      currentLanguage=data.language||"Ingles";
      document.getElementById("languageSelect").value=currentLanguage;
    });
  } else {
    user=null;
    authSection.classList.remove("hidden");
    appSection.classList.add("hidden");
    settingsBtn.style.display="none";
    logoutBtn.style.display="none";
  }
});

</script>
</body>
</html>
