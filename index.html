<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo Pro | VIP & Global</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6478620932842773" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin:0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; position: sticky; top:0; z-index:100; }
        
        /* BOTÕES E CARDS */
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #334155; margin-bottom: 15px; }
        button { padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; font-size: 14px; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #1D4ED8; }
        .btn-outline { background: #334155; color: white; margin-top: 10px; }

        /* NAVEGAÇÃO INFERIOR */
        nav { position: fixed; bottom: 0; width: 100%; background: #1E293B; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #334155; z-index: 100; }
        nav div { font-size: 20px; cursor: pointer; opacity: 0.6; }
        nav div.active { opacity: 1; color: var(--primary); }

        /* RANKING E VIP */
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; }
        .vip-badge { background: var(--gold); color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .price-card { border: 2px solid var(--gold); position: relative; overflow: hidden; }
        
        /* PRÁTICA */
        .word-area { min-height: 100px; border: 2px dashed #475569; border-radius: 20px; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; background: rgba(0,0,0,0.2); }
        .chip { background: #334155; padding: 10px 14px; border-radius: 12px; font-weight: 700; cursor: pointer; color: white; border: 1px solid #475569; }
        .chip.used { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

<header class="hidden" id="mainHeader">
    <div style="font-weight:900;">FLUENTGO <span id="langTag" style="color:var(--primary)">EN</span></div>
    <div style="display:flex; gap:15px;">
        <span style="color:var(--secondary); font-weight:800;">🔥 <span id="userXP">0</span></span>
    </div>
</header>

<main id="authView" class="container">
    <h1 style="text-align:center; font-size:3rem; margin: 60px 0;">FluentGo</h1>
    <div class="card">
        <input type="email" id="email" placeholder="E-mail" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #334155; background:#0F172A; color:white;">
        <input type="password" id="password" placeholder="Senha" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #334155; background:#0F172A; color:white;">
        <button id="loginBtn" class="btn-main">ENTRAR / CRIAR CONTA</button>
    </div>
</main>

<main id="homeView" class="container hidden" style="padding-bottom: 80px;">
    <div class="card" style="text-align:center;">
        <h2 id="levelTxt" style="margin:0;">Nível 1</h2>
        <p id="taskTxt" style="color:#94a3b8; font-size:14px;">Tarefa 1 de 10</p>
        <div style="background:#334155; height:8px; border-radius:10px; margin:15px 0;">
            <div id="mainProgress" style="height:100%; background:var(--secondary); width:0%; transition:0.4s;"></div>
        </div>
        <button id="startBtn" class="btn-main">PRATICAR AGORA</button>
    </div>
</main>

<main id="rankingView" class="container hidden" style="padding-bottom: 80px;">
    <h3>🏆 Top Global</h3>
    <div id="leaderboard" class="card">
        <p style="text-align:center; color:#94a3b8;">Carregando ranking...</p>
    </div>
</main>

<main id="vipView" class="container hidden" style="padding-bottom: 80px;">
    <h3>💎 FluentGo VIP</h3>
    <div class="card price-card">
        <div class="vip-badge" style="position:absolute; top:10px; right:10px;">OFERTA</div>
        <h4>Plano Vitalício</h4>
        <p style="font-size:12px; color:#94a3b8;">Acesso ilimitado, sem anúncios e emblema exclusivo.</p>
        <h2 style="color:var(--gold);">R$ 49,90</h2>
        <button class="btn-main" style="background:var(--gold); box-shadow:0 4px 0 #B45309;" onclick="alert('Sistema de pagamento em integração...')">ADQUIRIR VIP</button>
    </div>
</main>

<main id="settingsView" class="container hidden" style="padding-bottom: 80px;">
    <h3>⚙️ Configurações</h3>
    <div class="card">
        <label style="font-size:12px; color:#94a3b8;">IDIOMA DE ESTUDO</label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
            <button onclick="changeLang('English')" class="btn-outline">🇺🇸 Inglês</button>
            <button onclick="changeLang('Spanish')" class="btn-outline">🇪🇸 Espanhol</button>
            <button onclick="changeLang('French')" class="btn-outline">🇫🇷 Francês</button>
            <button onclick="changeLang('Italian')" class="btn-outline">🇮🇹 Italiano</button>
        </div>
        <button onclick="auth.signOut()" class="btn-outline" style="color:#EF4444; margin-top:30px;">Sair da Conta</button>
    </div>
</main>

<div id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:2000; padding:20px;">
    <div class="container">
        <h2 id="targetPhrase" style="text-align:center; font-size:2rem; margin-top:40px;">...</h2>
        <div id="dropZone" class="word-area"></div>
        <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;"></div>
        <button id="checkBtn" class="btn-main" style="margin-top:30px;">VERIFICAR</button>
    </div>
</div>

<nav id="mainNav" class="hidden">
    <div onclick="showTab('homeView')" id="nav-home" class="active">🏠</div>
    <div onclick="showTab('rankingView')" id="nav-rank">🏆</div>
    <div onclick="showTab('vipView')" id="nav-vip">💎</div>
    <div onclick="showTab('settingsView')" id="nav-settings">⚙️</div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update, set, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const vocab = { English: [{p:"Eu como pão", a:"i eat bread"}], Spanish: [{p:"Eu como pão", a:"yo como pan"}], French: [{p:"Eu como pão", a:"je mange du pain"}], Italian: [{p:"Eu como pão", a:"io mangio pane"}] };

let userData = { xp: 0, lvl: 1, task: 1, lang: "English", isVip: false };
let currentQ = {};

window.showTab = (id) => {
    ['homeView', 'rankingView', 'vipView', 'settingsView'].forEach(t => document.getElementById(t).classList.add('hidden'));
    document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('nav-'+id.replace('View','')).classList.add('active');
    if(id === 'rankingView') loadRanking();
};

async function loadRanking() {
    const rRef = query(ref(db, 'users'), orderByChild('xp'), limitToLast(10));
    const snap = await get(rRef);
    const board = document.getElementById('leaderboard');
    board.innerHTML = "";
    let users = [];
    snap.forEach(child => { users.push(child.val()); });
    users.reverse().forEach((u, i) => {
        board.innerHTML += `<div class="rank-item"><span>${i+1}. ${u.email.split('@')[0]} ${u.isVip ? '💎' : ''}</span> <b>${u.xp} XP</b></div>`;
    });
}

window.changeLang = async (l) => {
    userData.lang = l;
    document.getElementById('langTag').innerText = l.slice(0,2).toUpperCase();
    if(auth.currentUser) await update(ref(db, 'users/'+auth.currentUser.uid), {lang: l});
    alert("Idioma alterado para " + l);
};

function startPractice() {
    const item = vocab[userData.lang][0]; 
    currentQ = { p: item.p, a: item.a, parts: [...item.a.split(" "), "the", "is"].sort(() => Math.random()-0.5) };
    document.getElementById('practiceView').classList.remove('hidden');
    document.getElementById('targetPhrase').innerText = currentQ.p;
    document.getElementById('dropZone').innerHTML = "";
    const bank = document.getElementById('wordBank');
    bank.innerHTML = "";
    let guess = [];
    currentQ.parts.forEach(w => {
        const c = document.createElement('div'); c.className="chip"; c.innerText=w;
        c.onclick = () => { guess.push(w); document.getElementById('dropZone').innerHTML += w+" "; c.classList.add('used'); };
        bank.appendChild(c);
    });
    document.getElementById('checkBtn').onclick = async () => {
        if(guess.join(" ") === currentQ.a) {
            userData.xp += 100;
            userData.task++;
            await update(ref(db, 'users/'+auth.currentUser.uid), userData);
            alert("Correto!");
            document.getElementById('practiceView').classList.add('hidden');
            updateUI();
        } else { alert("Tente de novo!"); startPractice(); }
    };
}

function updateUI() {
    document.getElementById('userXP').innerText = userData.xp;
    document.getElementById('levelTxt').innerText = `Nível ${userData.lvl}`;
    document.getElementById('taskTxt').innerText = `Tarefa ${userData.task} de 10`;
    document.getElementById('mainProgress').style.width = `${(userData.task-1)*10}%`;
    document.getElementById('langTag').innerText = userData.lang.slice(0,2).toUpperCase();
}

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/'+u.uid));
        if(s.exists()) userData = s.val();
        document.getElementById('authView').classList.add('hidden');
        ['mainHeader', 'homeView', 'mainNav'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        updateUI();
    }
});

document.getElementById('loginBtn').onclick = async () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    try { await signInWithEmailAndPassword(auth, e, p); }
    catch { 
        const r = await createUserWithEmailAndPassword(auth, e, p);
        await set(ref(db, 'users/'+r.user.uid), userData);
    }
};

document.getElementById('startBtn').onclick = startPractice;
</script>
</body>
</html>
