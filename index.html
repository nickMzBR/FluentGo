<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluentGo</title>
<style>
body{margin:0;font-family:Arial;background:#222;color:#fff;text-align:center;overflow:hidden;}
header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#111;position:relative;z-index:100;}
header div{display:flex;align-items:center;}
button,select,input{padding:8px;border-radius:8px;border:none;margin:5px;font-size:1em;cursor:pointer;}
button{background:#2563EB;color:white;transition:0.2s;}
button:hover{transform:scale(1.05);}
.hidden{display:none !important;}
#lessonSection,#taskModal,#settingsSection,#congratsModal{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;z-index:50;}
#lessonContent,#taskModalContent{background:#333;padding:20px;border-radius:10px;width:80%;max-width:600px;animation:fadeIn 0.5s;}
#progressBar,#comboBar{width:80%;background:#555;border-radius:10px;margin:10px auto;height:20px;overflow:hidden;}
#progressFill,#comboFill{width:0%;height:100%;transition:width 0.3s;}
#progressFill{background:#2563EB;}
#comboFill{background:#FFD700;}
canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:10;}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.premium-btn{background:#FF9900;margin-left:10px;}
</style>
</head>
<body>
<canvas id="fxCanvas"></canvas>

<header>
  <div>
    <span>FluentGo</span>
  </div>
  <div>
    <button class="premium-btn" id="removeAdsBtn">Remova anúncios - R$9,99</button>
    <button class="premium-btn" id="premiumBtn">FluentGo Premium - R$4,99/mês</button>
    <button id="settingsBtn" class="hidden">Configurações</button>
    <button id="logoutBtn" class="hidden">Sair</button>
  </div>
</header>

<!-- LOGIN -->
<div id="authSection">
  <h2>Entrar</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha"><br>
  <button id="registerBtn">Criar Conta</button>
  <button id="loginBtn">Entrar</button>
</div>

<!-- MENU -->
<div id="appSection" class="hidden">
  <h2 id="currentLanguage"></h2>
  <h3>XP: <span id="xpDisplay">0</span></h3>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="comboBar"><div id="comboFill"></div></div>
  <button id="startLessonBtn">Começar Módulo</button>
</div>

<!-- CONFIGURAÇÕES -->
<div id="settingsSection" class="hidden">
  <h2>Configurações</h2>
  <select id="languageSelect">
    <option value="Ingles">Inglês</option>
    <option value="Espanhol">Espanhol</option>
    <option value="Japones">Japonês</option>
  </select><br>
  <label><input type="checkbox" id="soundToggle" checked> Som</label><br>
  <label><input type="checkbox" id="effectsToggle" checked> Efeitos Visuais</label><br>
  <button id="saveSettingsBtn">Salvar</button>
  <button id="closeSettingsBtn">Fechar</button>
</div>

<!-- LIÇÃO -->
<div id="lessonSection" class="hidden">
  <div id="lessonContent">
    <h3 id="lessonTitle"></h3>
    <p id="lessonText"></p>
    <button id="startTaskBtn">Começar Tarefa</button>
  </div>
</div>

<!-- TAREFA -->
<div id="taskModal" class="hidden">
  <div id="taskModalContent">
    <h3 id="taskTitle"></h3>
    <div id="exerciseContainer"></div>
    <button id="exitTaskBtn">Sair da Tarefa</button>
  </div>
</div>

<!-- PARABÉNS -->
<div id="congratsModal" class="hidden">
  <h1>Parabéns! 🎉</h1>
  <p>Você concluiu o curso de <span id="congratsLanguage"></span>!</p>
  <button id="closeCongratsBtn">Fechar</button>
</div>

<!-- SONS -->
<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// --- Firebase ---
const firebaseConfig = {
  apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw",
  authDomain: "fluentgo-35024.firebaseapp.com",
  databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com",
  projectId: "fluentgo-35024",
  storageBucket: "fluentgo-35024.firebasestorage.app",
  messagingSenderId: "613715387990",
  appId: "1:613715387990:web:0345ade26374dd32d1fdf7"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// --- DOM ---
const authSection=document.getElementById("authSection"),
      appSection=document.getElementById("appSection"),
      settingsSection=document.getElementById("settingsSection"),
      settingsBtn=document.getElementById("settingsBtn"),
      logoutBtn=document.getElementById("logoutBtn"),
      xpDisplay=document.getElementById("xpDisplay"),
      lessonSection=document.getElementById("lessonSection"),
      lessonTitle=document.getElementById("lessonTitle"),
      lessonText=document.getElementById("lessonText"),
      taskModal=document.getElementById("taskModal"),
      taskTitle=document.getElementById("taskTitle"),
      exerciseContainer=document.getElementById("exerciseContainer"),
      progressFill=document.getElementById("progressFill"),
      congratsModal=document.getElementById("congratsModal"),
      congratsLanguage=document.getElementById("congratsLanguage"),
      correctSound=document.getElementById("correctSound"),
      wrongSound=document.getElementById("wrongSound"),
      comboFill=document.getElementById("comboFill"),
      languageSelect=document.getElementById("languageSelect"),
      currentLanguageDisplay=document.getElementById("currentLanguage"),
      soundToggle=document.getElementById("soundToggle"),
      effectsToggle=document.getElementById("effectsToggle");

// --- Inputs ---
const emailInput=document.getElementById("email"),
      passwordInput=document.getElementById("password"),
      registerBtn=document.getElementById("registerBtn"),
      loginBtn=document.getElementById("loginBtn"),
      startLessonBtn=document.getElementById("startLessonBtn"),
      startTaskBtn=document.getElementById("startTaskBtn"),
      exitTaskBtn=document.getElementById("exitTaskBtn"),
      saveSettingsBtn=document.getElementById("saveSettingsBtn"),
      closeSettingsBtn=document.getElementById("closeSettingsBtn"),
      closeCongratsBtn=document.getElementById("closeCongratsBtn");

// --- Estado ---
let user=null,currentLanguage="Ingles",currentModule=1,currentTask=1,xp=0;
let comboCount=0,maxCombo=0;
let taskData=[], currentQuestionIndex=0;

// --- Perguntas exemplo ---
const exampleQuestions = {
  Ingles:[{question:"Como se diz 'Bom dia'?",type:"translate",answer:"Good morning"}],
  Espanhol:[{question:"Como se diz 'Bom dia'?",type:"translate",answer:"Buenos días"}],
  Japones:[{question:"Como se diz 'Bom dia'?",type:"translate",answer:"おはよう"}]
};

// --- Partículas FX ---
const canvas=document.getElementById("fxCanvas"), ctx=canvas.getContext("2d");
canvas.width=window.innerWidth; canvas.height=window.innerHeight; let particles=[];
function spawnParticles(x,y,color){ if(!effectsToggle.checked) return; for(let i=0;i<20;i++){ particles.push({x,y,dx:(Math.random()-0.5)*4,dy:(Math.random()-2)*4,r:Math.random()*4+2,color,life:50}); } }
function drawParticles(){ ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach((p,i)=>{ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill(); p.x+=p.dx; p.y+=p.dy; p.life--; if(p.life<=0) particles.splice(i,1); }); requestAnimationFrame(drawParticles);}
drawParticles();

// --- Salvar/Carregar ---
function saveProgress(){ if(!user) return; set(ref(db, 'users/'+user.uid+'/progress'),{xp,currentModule,currentTask,currentLanguage,comboCount}); }
async function loadProgress(){ if(!user) return; const snapshot = await get(ref(db,'users/'+user.uid+'/progress')); if(snapshot.exists()){ const data=snapshot.val(); xp=data.xp||0; currentModule=data.currentModule||1; currentTask=data.currentTask||1; currentLanguage=data.currentLanguage||"Ingles"; comboCount=data.comboCount||0; xpDisplay.innerText=xp; currentLanguageDisplay.innerText=currentLanguage; } else { xpDisplay.innerText=xp; currentLanguageDisplay.innerText=currentLanguage; } }

// --- Tarefas ---
function startNextTask(){ taskModal.classList.remove("hidden"); appSection.classList.add("hidden"); currentQuestionIndex=0; taskData=[...exampleQuestions[currentLanguage]]; showExercise(); }
function showExercise(){ const q=taskData[currentQuestionIndex]; exerciseContainer.innerHTML=""; taskTitle.innerText=`${currentLanguage} - Pergunta ${currentQuestionIndex+1}/${taskData.length}`; if(q.type==="translate"){ const input=document.createElement("input"); input.id="answerInput"; input.placeholder="Digite a resposta"; exerciseContainer.appendChild(document.createTextNode(q.question)); exerciseContainer.appendChild(document.createElement("br")); exerciseContainer.appendChild(input); const submitBtn=document.createElement("button"); submitBtn.innerText="Responder"; submitBtn.onclick=()=>checkAnswer(input.value); exerciseContainer.appendChild(document.createElement("br")); exerciseContainer.appendChild(submitBtn); } else { exerciseContainer.appendChild(document.createTextNode(q.question)); exerciseContainer.appendChild(document.createElement("br")); q.options.forEach(opt=>{ const btn=document.createElement("button"); btn.innerText=opt; btn.onclick=()=>checkAnswer(opt); exerciseContainer.appendChild(btn); exerciseContainer.appendChild(document.createElement("br")); }); } }
function checkAnswer(ans){ const q=taskData[currentQuestionIndex]; const correct=(ans&&ans.toString().toLowerCase()===q.answer.toString().toLowerCase()); if(correct){ xp+=10; xpDisplay.innerText=xp; if(soundToggle.checked) correctSound.play(); spawnParticles(window.innerWidth/2,200,"#00FF00"); comboCount++; if(comboCount>5) comboCount=5; comboFill.style.width=(comboCount/5*100)+"%"; } else { if(soundToggle.checked) wrongSound.play(); spawnParticles(window.innerWidth/2,200,"#FF0000"); comboCount=0; comboFill.style.width="0%"; } saveProgress(); setTimeout(()=>{ currentQuestionIndex++; if(currentQuestionIndex<taskData.length){ showExercise(); } else { taskModal.classList.add("hidden"); appSection.classList.remove("hidden"); } },500); }

// --- Botões ---
exitTaskBtn.onclick = ()=>{ taskModal.classList.add("hidden"); appSection.classList.remove("hidden"); saveProgress(); }
startTaskBtn.onclick = startNextTask;
startLessonBtn.onclick = startNextTask;
settingsBtn.onclick = ()=>{ settingsSection.classList.remove("hidden"); }
closeSettingsBtn.onclick = ()=>{ settingsSection.classList.add("hidden"); }
saveSettingsBtn.onclick = ()=>{ currentLanguage=languageSelect.value; currentLanguageDisplay.innerText=currentLanguage; settingsSection.classList.add("hidden"); saveProgress(); }

// --- Auth ---
registerBtn.onclick = ()=>{ createUserWithEmailAndPassword(auth,emailInput.value,passwordInput.value).catch(console.error) }
loginBtn.onclick = ()=>{ signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value).catch(console.error) }
logoutBtn.onclick = ()=>{ signOut(auth).catch(console.error) }

onAuthStateChanged(auth, async (u)=>{ if(u){ user=u; authSection.classList.add("hidden"); appSection.classList.remove("hidden"); settingsBtn.classList.remove("hidden"); logoutBtn.classList.remove("hidden"); await loadProgress(); } else { user=null; authSection.classList.remove("hidden"); appSection.classList.add("hidden"); settingsBtn.classList.add("hidden"); logoutBtn.classList.add("hidden"); } })
</script>
</body>
</html>
