<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluentGo | Pro</title>
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --premium: #FF9900; --danger: #EF4444; --bg: #121212; --card: #1E1E1E; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; text-align: center; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #000; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        button { padding: 14px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1em; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-ghost { background: #333; color: #ccc; margin-top: 10px; }
        .btn-lang { background: #252525; border: 2px solid #444; color: white; margin: 10px 0; width: 100%; font-size: 1.2em; }
        .progress-container { background: #333; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        input[type="text"] { background: #252525; border: 2px solid #444; padding: 15px; border-radius: 15px; color: white; font-size: 1.2em; text-align: center; width: 90%; outline: none; }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

<canvas id="fxCanvas"></canvas>

<header>
    <div style="font-size: 1.5em; font-weight: 900;">FLUENT<span style="color:var(--primary)">GO</span></div>
    <div id="userMenu" class="hidden"><span id="userXpDisplay" style="color: var(--premium); font-weight: bold;">0 XP</span></div>
</header>

<div id="authSection" class="container">
    <div class="card" style="margin-top: 50px;">
        <h2>Aprenda agora.</h2>
        <input type="email" id="email" placeholder="E-mail" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 8px;"><br>
        <input type="password" id="password" placeholder="Senha" style="width: 90%; padding: 10px; margin-bottom: 20px; border-radius: 8px;"><br>
        <button id="loginBtn" class="btn-main">ENTRAR</button>
        <button id="registerBtn" class="btn-ghost" style="width: 100%">CRIAR CONTA</button>
    </div>
</div>

<div id="langOnboarding" class="container hidden">
    <div class="card">
        <h2>Escolha seu Idioma</h2>
        <button class="btn-lang" onclick="setInitialLang('Ingles')">🇺🇸 Inglês</button>
        <button class="btn-lang" onclick="setInitialLang('Espanhol')">🇪🇸 Espanhol</button>
        <button class="btn-lang" onclick="setInitialLang('Japones')">🇯🇵 Japonês</button>
    </div>
</div>

<div id="appSection" class="container hidden">
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <div style="flex:1; background:#252525; padding:10px; border-radius:15px;">🌍 <b id="currentLangLabel">---</b></div>
        <div style="flex:1; background:#252525; padding:10px; border-radius:15px;">🔥 Combo: <b id="comboLabel">0</b></div>
    </div>
    <div class="card">
        <h3 id="moduleLabel">Módulo 1</h3>
        <p id="taskLabel" style="color: #aaa;">Tarefa 1 de 5</p>
        <div class="progress-container"><div id="mainProgress" class="progress-fill"></div></div>
        <button id="startBtn" class="btn-main">CONTINUAR</button>
    </div>
    <button id="configBtn" class="btn-ghost" style="width: 100%;">⚙️ Configurações</button>
    <button id="logoutBtn" class="btn-ghost" style="width: 100%; color: var(--danger);">Sair</button>
</div>

<div id="taskModal" class="hidden" style="position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column;">
    <div style="padding: 20px;"><div class="progress-container"><div id="taskProgress" class="progress-fill"></div></div></div>
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 30px;">
        <h4 style="color: var(--primary);">TRADUZA</h4>
        <h1 id="questionDisplay" style="font-size: 2.5em;">Olá</h1>
        <input type="text" id="answerInput" autocomplete="off" placeholder="Resposta...">
        <div id="feedback" style="margin-top: 20px; font-weight: bold; min-height: 30px;"></div>
        <button id="checkBtn" class="btn-main" style="margin-top: 30px; align-self: center; width: 80%;">VERIFICAR</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// CURRÍCULO COM VARIAÇÕES (Array de respostas)
const courseData = {
    Ingles: {
        M1: [
            {q: "Olá", a: ["hello", "hi"]},
            {q: "Sim", a: ["yes", "yeah"]},
            {q: "Por favor", a: ["please"]},
            {q: "Obrigado", a: ["thank you", "thanks"]},
            {q: "Tchau", a: ["goodbye", "bye"]}
        ],
        M2: [
            {q: "Água", a: ["water"]},
            {q: "Café", a: ["coffee"]},
            {q: "Maçã", a: ["apple"]},
            {q: "Pão", a: ["bread"]},
            {q: "Leite", a: ["milk"]}
        ],
        // ... (Adicionar M3 a M10 seguindo este padrão de Array em 'a')
    },
    Espanhol: {
        M1: [
            {q: "Olá", a: ["hola"]},
            {q: "Obrigado", a: ["gracias"]},
            {q: "Bom dia", a: ["buenos dias"]},
            {q: "Tchau", a: ["adios", "chao"]},
            {q: "Sim", a: ["si"]}
        ]
    },
    Japones: {
        M1: [
            {q: "Bom dia", a: ["ohayou", "ohayo"]},
            {q: "Obrigado", a: ["arigatou", "arigato"]},
            {q: "Olá", a: ["konnichiwa", "konichiwa"]},
            {q: "Sim", a: ["hai"]},
            {q: "Não", a: ["iie", "ie"]}
        ]
    }
};

let userData = { xp: 0, lang: "", mod: 1, task: 1, combo: 0 };
let taskQuestions = [];
let qIdx = 0;

const updateUI = () => {
    document.getElementById("userXpDisplay").innerText = `${userData.xp || 0} XP`;
    document.getElementById("currentLangLabel").innerText = userData.lang || "---";
    document.getElementById("comboLabel").innerText = userData.combo || 0;
    document.getElementById("moduleLabel").innerText = `Módulo ${userData.mod || 1}`;
    document.getElementById("taskLabel").innerText = `Tarefa ${userData.task || 1} de 5`;
    document.getElementById("mainProgress").style.width = `${((userData.task - 1) || 0) * 20}%`;
};

window.setInitialLang = async (lang) => {
    userData.lang = lang; userData.mod = 1; userData.task = 1; userData.xp = 0; userData.combo = 0;
    await set(ref(db, 'users/' + auth.currentUser.uid), userData);
    showSection("appSection"); updateUI();
};

function initTask() {
    const modKey = "M" + userData.mod;
    // Puxamos as 5 perguntas DIFERENTES do módulo atual
    taskQuestions = courseData[userData.lang][modKey] || courseData[userData.lang]["M1"];
    qIdx = 0;
    showSection("taskModal");
    renderQuestion();
}

function renderQuestion() {
    const q = taskQuestions[qIdx];
    document.getElementById("taskProgress").style.width = `${(qIdx / 5) * 100}%`;
    document.getElementById("questionDisplay").innerText = q.q;
    document.getElementById("answerInput").value = "";
    document.getElementById("answerInput").focus();
    document.getElementById("feedback").innerText = "";
}

function checkAnswer() {
    const userVal = document.getElementById("answerInput").value.trim().toLowerCase();
    const possibleAnswers = taskQuestions[qIdx].a; // Isso agora é um Array
    const feedback = document.getElementById("feedback");

    if (possibleAnswers.includes(userVal)) {
        feedback.innerText = "✨ CORRETO!"; feedback.style.color = "var(--secondary)";
        userData.xp += 10; userData.combo++;
        spawnParticles(window.innerWidth/2, window.innerHeight/2, "#10B981");
        qIdx++;
        if(qIdx < 5) setTimeout(renderQuestion, 1000);
        else setTimeout(finishTask, 1000);
    } else {
        feedback.innerText = `RESPOSTA: ${possibleAnswers[0].toUpperCase()}`;
        feedback.style.color = "var(--danger)";
        userData.combo = 0;
        spawnParticles(window.innerWidth/2, window.innerHeight/2, "#EF4444");
    }
    updateUI();
}

async function finishTask() {
    userData.task++;
    if(userData.task > 5) { userData.task = 1; userData.mod++; }
    await set(ref(db, 'users/' + auth.currentUser.uid), userData);
    showSection("appSection"); updateUI();
}

// FX & UI Logic
const showSection = (id) => {
    ["authSection", "appSection", "taskModal", "langOnboarding"].forEach(s => document.getElementById(s).classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
};

// ... (Partículas Canvas - mantidas as mesmas do código anterior)
const canvas = document.getElementById("fxCanvas"), ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let parts = [];
function spawnParticles(x,y,c){ for(let i=0;i<20;i++) parts.push({x,y,dx:(Math.random()-0.5)*10,dy:(Math.random()-0.5)*10,life:1,c}); }
function renderFX(){ ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach((p,i)=>{ ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill(); p.x+=p.dx; p.y+=p.dy; p.life-=0.02; if(p.life<=0) parts.splice(i,1); }); requestAnimationFrame(renderFX); }
renderFX();

document.getElementById("loginBtn").onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("registerBtn").onclick = () => createUserWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("logoutBtn").onclick = () => signOut(auth);
document.getElementById("startBtn").onclick = initTask;
document.getElementById("checkBtn").onclick = checkAnswer;
document.getElementById("configBtn").onclick = () => showSection("langOnboarding");
document.getElementById("answerInput").onkeypress = (e) => { if(e.key === 'Enter') checkAnswer(); };

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/' + u.uid));
        if(s.exists()) { userData = s.val(); if(!userData.lang) showSection("langOnboarding"); else showSection("appSection"); }
        else showSection("langOnboarding");
        document.getElementById("userMenu").classList.remove("hidden"); updateUI();
    } else { showSection("authSection"); document.getElementById("userMenu").classList.add("hidden"); }
});
</script>
</body>
</html>
