l<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --streak: #FF4500; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin:0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 1000; }
        .stat-badge { background: #000; padding: 5px 12px; border-radius: 12px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        
        #settingsModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .settings-card { background: var(--card); width: 85%; max-width: 350px; padding: 30px; border-radius: 28px; text-align: center; border: 1px solid #334155; }

        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; margin-bottom: 15px; }
        .progress-bar { background: #334155; height: 10px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.5s; }
        
        .teach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .word-card { background: var(--card); border-radius: 22px; border: 2px solid #334155; overflow: hidden; text-align: center; padding-bottom: 10px; cursor: pointer;}
        .word-img { width: 100%; height: 110px; object-fit: cover; background: #2d3748; pointer-events: none; }

        .word-area { min-height: 110px; border: 2px dashed #334155; border-radius: 20px; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2); }
        .chip { background: #334155; padding: 14px 18px; border-radius: 16px; border-bottom: 4px solid #1e293b; font-weight: 700; cursor: pointer; }
        .chip.used { opacity: 0.2; pointer-events: none; }

        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #334155; background: #0F172A; color: white; margin-bottom: 12px; }
        button { padding: 18px; border-radius: 18px; border: none; font-weight: 900; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-success { background: var(--secondary); color: white; box-shadow: 0 4px 0 #059669; }
        .btn-danger { background: #ef4444; color: white; margin-top: 15px; }
        .btn-outline { background: transparent; border: 1px solid #334155; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

<header class="hidden" id="mainHeader">
    <div style="font-weight:900;">FLUENTGO <span id="currentLangLabel" style="color:var(--primary); font-size:0.75rem; border:1.5px solid; padding:2px 6px; border-radius:6px; margin-left:5px;">EN</span></div>
    <div style="display:flex; align-items:center; gap:12px;">
        <div class="stat-badge" style="color: var(--streak);">🔥 <span id="streakVal">0</span></div>
        <div onclick="toggleSettings(true)" style="cursor:pointer; font-size: 1.4rem;">⚙️</div>
    </div>
</header>

<div id="settingsModal">
    <div class="settings-card">
        <h3>Idioma do Curso</h3>
        <button onclick="changeLanguage('English')" class="btn-outline">🇺🇸 English</button>
        <button onclick="changeLanguage('Spanish')" class="btn-outline">🇪🇸 Spanish</button>
        <button onclick="changeLanguage('French')" class="btn-outline">🇫🇷 French</button>
        <hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
        <button onclick="toggleSettings(false)" class="btn-main">Voltar</button>
        <button onclick="handleLogout()" class="btn-danger">Sair</button>
    </div>
</div>

<main id="landingView" class="container">
    <h1 style="text-align:center; font-size:2.8rem; font-weight:900; margin-top:60px;">Aprenda <br><span style="color:var(--secondary)">Visualmente</span></h1>
    <div class="card" style="margin-top:30px;">
        <div id="regOnly" class="hidden"><input type="text" id="username" placeholder="Nome de usuário"></div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="authBtn" class="btn-main">ENTRAR</button>
        <button onclick="toggleAuthMode()" id="toggleAuthBtn" style="background:none; color:#94a3b8; margin-top:12px; text-decoration:underline;">Criar conta nova</button>
    </div>
</main>

<main id="dashboardView" class="container hidden">
    <div class="card">
        <h2 id="modLabel" style="margin:0;">Nível 1</h2>
        <div class="progress-bar"><div id="mainProgress" class="progress-fill"></div></div>
        <p id="xpText" style="color:#94a3b8; font-size:0.95rem; font-weight:700;">0 XP</p>
        <button id="actionBtn" class="btn-main" style="margin-top:10px;">COMEÇAR</button>
    </div>
</main>

<main id="teachingView" class="container hidden">
    <h2 style="text-align:center;">Dicionário</h2>
    <div class="teach-grid" id="teachGrid"></div>
    <button id="confirmTeach" class="btn-success">PRONTO PARA O TESTE</button>
</main>

<main id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:2000; padding:20px;">
    <div class="progress-bar"><div id="taskProgress" class="progress-fill"></div></div>
    <div class="container">
        <div id="audioBtn" style="font-size:5rem; cursor:pointer; text-align:center; margin-top:40px;">🔊</div>
        <h2 id="questionTxt" style="text-align:center; margin:30px 0; font-size:1.8rem;">...</h2>
        <div id="dropZone" class="word-area"></div>
        <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        <div id="feedback" style="margin-top:20px; text-align:center; font-weight:900; height:25px;"></div>
        <button id="checkBtn" class="btn-main" style="margin-top:30px;">VERIFICAR RESPOSTA</button>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// BANCO DE DADOS MULTI-LÍNGUA
const dbLangs = {
    English: {
        code: "en-US", label: "EN",
        words: { "I": "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=200", "You": "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=200", "eat": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200", "drink": "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=200", "bread": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "water": "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=200" },
        sentences: [{pt: "Eu como pão", ans: "i eat bread", parts: ["i", "eat", "bread", "a"]}, {pt: "Você bebe água", ans: "you drink water", parts: ["you", "drink", "water", "is"]}]
    },
    Spanish: {
        code: "es-ES", label: "ES",
        words: { "Yo": "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=200", "Tú": "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=200", "como": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200", "bebo": "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=200", "pan": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "agua": "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=200" },
        sentences: [{pt: "Eu como pão", ans: "yo como pan", parts: ["yo", "como", "pan", "el"]}, {pt: "Eu bebo água", ans: "yo bebo agua", parts: ["yo", "bebo", "agua", "la"]}]
    },
    French: {
        code: "fr-FR", label: "FR",
        words: { "Je": "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=200", "Tu": "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=200", "mange": "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200", "bois": "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=200", "pain": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200", "eau": "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=200" },
        sentences: [{pt: "Eu como pão", ans: "je mange pain", parts: ["je", "mange", "pain", "le"]}, {pt: "Eu bebo água", ans: "je bois eau", parts: ["je", "bois", "eau", "la"]}]
    }
};

let userData = { progress: { English: 0, Spanish: 0, French: 0 }, currentLang: "English", streak: 0, lastDate: "", hasLearned: false };
let currentQ = []; let qIdx = 0; let userPhrase = []; let authMode = 'login';

window.changeLanguage = async (lang) => {
    userData.currentLang = lang;
    if(userData.progress[lang] === undefined) userData.progress[lang] = 0;
    userData.hasLearned = false; 
    await update(ref(db, 'users/'+auth.currentUser.uid), { currentLang: lang, progress: userData.progress, hasLearned: false });
    toggleSettings(false);
    updateUI();
};

window.toggleSettings = (s) => document.getElementById('settingsModal').style.display = s ? 'flex' : 'none';
window.handleLogout = () => { toggleSettings(false); signOut(auth); };
window.toggleAuthMode = () => {
    authMode = authMode === 'login' ? 'register' : 'login';
    document.getElementById('regOnly').classList.toggle('hidden', authMode === 'login');
    document.getElementById('authBtn').innerText = authMode === 'login' ? 'ENTRAR' : 'CRIAR CONTA';
};

const showView = (id) => {
    ['landingView', 'dashboardView', 'teachingView', 'practiceView'].forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('mainHeader').classList.toggle('hidden', id === 'landingView');
};

const speak = (t) => { 
    const m = new SpeechSynthesisUtterance(t); 
    m.lang = dbLangs[userData.currentLang].code;
    window.speechSynthesis.speak(m); 
};

function updateUI() {
    const lang = userData.currentLang;
    const xp = userData.progress[lang] || 0;
    document.getElementById('currentLangLabel').innerText = dbLangs[lang].label;
    document.getElementById('streakVal').innerText = userData.streak;
    document.getElementById('modLabel').innerText = `Nível ${Math.floor(xp/100)+1}`;
    document.getElementById('xpText').innerText = `${xp} XP acumulado`;
    document.getElementById('mainProgress').style.width = `${xp % 100}%`;
    
    const btn = document.getElementById('actionBtn');
    btn.innerText = userData.hasLearned ? "COMEÇAR PRÁTICA" : "ESTUDAR PALAVRAS";
    btn.onclick = userData.hasLearned ? startPractice : startTeaching;
}

function startTeaching() {
    showView('teachingView');
    const grid = document.getElementById('teachGrid'); grid.innerHTML = "";
    const langData = dbLangs[userData.currentLang];
    Object.keys(langData.words).forEach(word => {
        grid.innerHTML += `<div class="word-card" onclick="speak('${word}')"><img src="${langData.words[word]}" class="word-img"><b>${word}</b></div>`;
    });
}

document.getElementById('confirmTeach').onclick = async () => {
    userData.hasLearned = true;
    await update(ref(db, 'users/'+auth.currentUser.uid), { hasLearned: true });
    updateUI(); showView('dashboardView');
};

function startPractice() {
    currentQ = dbLangs[userData.currentLang].sentences.sort(() => Math.random() - 0.5).slice(0,5);
    qIdx = 0; showView('practiceView'); renderExercise();
}

function renderExercise() {
    const q = currentQ[qIdx];
    document.getElementById('taskProgress').style.width = `${(qIdx / currentQ.length) * 100}%`;
    document.getElementById('questionTxt').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    document.getElementById('feedback').innerText = "";
    userPhrase = [];
    const bank = document.getElementById('wordBank'); bank.innerHTML = "";
    q.parts.sort(() => Math.random() - 0.5).forEach(w => {
        const b = document.createElement('div'); b.className = "chip"; b.innerText = w;
        b.onclick = () => { if(!b.classList.contains('used')) { userPhrase.push(w); document.getElementById('dropZone').innerHTML += `<span>${w} </span>`; b.classList.add('used'); speak(w); }};
        bank.appendChild(b);
    });
}

document.getElementById('checkBtn').onclick = async () => {
    if(userPhrase.join(" ").toLowerCase().trim() === currentQ[qIdx].ans) {
        document.getElementById('feedback').innerText = "✨ MUITO BEM!";
        userData.progress[userData.currentLang] += 20;
        qIdx++;
        if(qIdx < currentQ.length) setTimeout(renderExercise, 1000);
        else {
            await update(ref(db, 'users/'+auth.currentUser.uid), { progress: userData.progress });
            showView('dashboardView'); updateUI();
        }
    } else { document.getElementById('feedback').innerText = "❌ TENTE NOVAMENTE"; }
};

document.getElementById('audioBtn').onclick = () => speak(currentQ[qIdx].ans);

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const snap = await get(ref(db, 'users/'+u.uid));
        if(snap.exists()) {
            userData = snap.val();
            if(!userData.progress) userData.progress = { English: 0, Spanish: 0, French: 0 };
        } else { await set(ref(db, 'users/'+u.uid), userData); }
        showView('dashboardView'); updateUI();
    } else { showView('landingView'); }
});

document.getElementById('authBtn').onclick = async () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    try {
        if(authMode === 'register') {
            const r = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/'+r.user.uid), { ...userData, username: document.getElementById('username').value });
        } else { await signInWithEmailAndPassword(auth, e, p); }
    } catch(err) { alert(err.message); }
};
</script>
</body>
</html>
