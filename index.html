<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo Pro | v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin:0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 90px; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; position: sticky; top:0; z-index:100; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #334155; margin-bottom: 15px; position: relative; }
        
        button { padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; font-size: 14px; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #1D4ED8; }
        .btn-outline { background: #334155; color: white; margin-top: 10px; border: 1px solid #475569; }
        .btn-outline.active { border: 2px solid var(--primary); background: rgba(37, 99, 235, 0.1); }

        nav { position: fixed; bottom: 0; width: 100%; background: #1E293B; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #334155; z-index: 1000; }
        nav div { font-size: 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        nav div.active { opacity: 1; color: var(--primary); transform: scale(1.1); }

        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; align-items: center; }
        .word-area { min-height: 110px; border: 2px dashed #475569; border-radius: 20px; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; background: rgba(0,0,0,0.2); }
        .chip { background: #334155; padding: 12px 16px; border-radius: 14px; font-weight: 700; cursor: pointer; color: white; border: 1px solid #475569; font-size: 16px; }
        .chip.used { opacity: 0.1; pointer-events: none; }
        
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #334155; background: #0F172A; color: white; outline: none; }
    </style>
</head>
<body>

<header id="mainHeader" class="hidden">
    <div style="font-weight:900; letter-spacing:-1px;">FLUENTGO <span id="langTag" style="color:var(--primary); font-size:11px; background:rgba(37,99,235,0.1); padding:2px 5px; border-radius:4px;">EN</span></div>
    <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="userXP">0</span></div>
</header>

<main id="authView" class="container">
    <h1 style="text-align:center; font-size:3.5rem; font-weight:900; margin: 60px 0 20px;">FluentGo</h1>
    <div class="card">
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="password" placeholder="Sua senha">
        <button id="loginBtn" class="btn-main">ENTRAR / CADASTRAR</button>
    </div>
</main>

<main id="homeView" class="container hidden">
    <div class="card" style="text-align:center;">
        <h2 id="levelTxt">Nível 1</h2>
        <p id="taskTxt" style="color:#94a3b8; font-size: 14px;">Tarefa 1 de 10</p>
        <div style="background:#334155; height:10px; border-radius:10px; margin:15px 0; overflow:hidden;">
            <div id="mainProgress" style="height:100%; background:var(--secondary); width:0%; transition:0.4s;"></div>
        </div>
        <button id="startBtn" class="btn-main">PRATICAR AGORA</button>
    </div>
</main>

<main id="rankingView" class="container hidden">
    <h3 style="margin-left:5px;">🏆 Ranking Global</h3>
    <div id="leaderboard" class="card" style="padding: 10px;">
        <p style="text-align:center; color:#64748b;">Carregando...</p>
    </div>
</main>

<main id="vipView" class="container hidden">
    <h3 style="margin-left:5px;">💎 FluentGo Premium</h3>
    <div class="card" style="border: 2px solid var(--gold); text-align:center; background: linear-gradient(145deg, #1e293b, #0f172a);">
        <div style="background:var(--gold); color:black; font-size:10px; font-weight:900; padding:3px 8px; border-radius:5px; position:absolute; top:10px; right:10px;">MAIS POPULAR</div>
        <h4 style="margin-top:10px; color:var(--gold);">PLANO MENSAL</h4>
        <p style="font-size:13px; color:#94a3b8; margin:15px 0;">Remova anúncios, ganhe o emblema de diamante e libere todos os idiomas.</p>
        <h2 style="margin:10px 0; font-size:2.5rem;">R$ 4,99<span style="font-size:1rem; color:#64748b;">/mês</span></h2>
        <button class="btn-main" style="background:var(--gold); border:none; box-shadow: 0 4px 0 #b45309; color:black;" onclick="alert('Redirecionando para o Checkout...')">ASSINAR AGORA</button>
    </div>
</main>

<main id="settingsView" class="container hidden">
    <h3 style="margin-left:5px;">⚙️ Configurações</h3>
    <div class="card">
        <p style="font-size:11px; color:#94a3b8; margin-bottom:10px; font-weight:800; text-transform:uppercase;">Idioma de Estudo</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button onclick="changeLang('English')" class="btn-outline" id="opt-English">🇺🇸 Inglês</button>
            <button onclick="changeLang('Spanish')" class="btn-outline" id="opt-Spanish">🇪🇸 Espanhol</button>
            <button onclick="changeLang('French')" class="btn-outline" id="opt-French">🇫🇷 Francês</button>
            <button onclick="changeLang('Italian')" class="btn-outline" id="opt-Italian">🇮🇹 Italiano</button>
        </div>
        <button onclick="auth.signOut()" class="btn-outline" style="color:#EF4444; margin-top:40px; border-color: rgba(239, 68, 68, 0.3);">Sair da Conta</button>
    </div>
</main>

<div id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:5000; padding:20px; overflow-y:auto;">
    <div class="container">
        <p style="text-align:center; color:var(--primary); font-weight:900; font-size:12px; margin-top:30px;">TRADUZA A FRASE ABAIXO</p>
        <h2 id="targetPhrase" style="text-align:center; font-size:2.2rem; margin: 20px 0; font-weight:900;">...</h2>
        <div id="dropZone" class="word-area"></div>
        <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        <button id="checkBtn" class="btn-main" style="margin-top:40px;">VERIFICAR</button>
        <button onclick="document.getElementById('practiceView').classList.add('hidden')" style="background:none; color:#475569; margin-top:10px; font-size:12px;">Desistir desta tarefa</button>
    </div>
</div>

<nav id="mainNav" class="hidden">
    <div onclick="showTab('homeView')" id="nav-home" class="active">🏠</div>
    <div onclick="showTab('rankingView')" id="nav-ranking">🏆</div>
    <div onclick="showTab('vipView')" id="nav-vip">💎</div>
    <div onclick="showTab('settingsView')" id="nav-settings">⚙️</div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update, set, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const database = {
    English: [{pt: "Eu como pão", ans: "i eat bread"}, {pt: "Eu bebo água", ans: "i drink water"}, {pt: "A casa é azul", ans: "the house is blue"}, {pt: "O carro é rápido", ans: "the car is fast"}],
    Spanish: [{pt: "Eu como pão", ans: "yo como pan"}, {pt: "Eu bebo água", ans: "yo bebo agua"}],
    French: [{pt: "Eu como pão", ans: "je mange du pain"}],
    Italian: [{pt: "Eu como pão", ans: "io mangio pane"}]
};

// Objeto de dados com valores padrão para evitar 'undefined'
let userData = { xp: 0, lvl: 1, task: 1, lang: "English", isVip: false };
let currentTask = [];
let qIdx = 0;
let userGuess = [];

function updateUI() {
    document.getElementById('userXP').innerText = userData.xp || 0;
    document.getElementById('levelTxt').innerText = `Nível ${userData.lvl || 1}`;
    document.getElementById('taskTxt').innerText = `Tarefa ${userData.task || 1} de 10`;
    document.getElementById('mainProgress').style.width = `${((userData.task || 1) - 1) * 10}%`;
    document.getElementById('langTag').innerText = (userData.lang || "English").slice(0,2).toUpperCase();
    
    document.querySelectorAll('.btn-outline').forEach(b => b.classList.remove('active'));
    const activeBtn = document.getElementById('opt-' + (userData.lang || "English"));
    if(activeBtn) activeBtn.classList.add('active');
}

window.showTab = (id) => {
    ['homeView', 'rankingView', 'vipView', 'settingsView'].forEach(v => document.getElementById(v).classList.add('hidden'));
    document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('nav-' + id.replace('View', '')).classList.add('active');
    if(id === 'rankingView') loadRanking();
};

async function loadRanking() {
    try {
        const rRef = query(ref(db, 'users'), orderByChild('xp'), limitToLast(10));
        const snap = await get(rRef);
        const board = document.getElementById('leaderboard');
        board.innerHTML = "";
        let users = [];
        snap.forEach(c => { users.push(c.val()); });
        users.reverse().forEach((u, i) => {
            const name = u.email ? u.email.split('@')[0] : "Usuário";
            board.innerHTML += `<div class="rank-item"><span>${i+1}. ${name} ${u.isVip ? '💎' : ''}</span> <b>${u.xp || 0} XP</b></div>`;
        });
    } catch (e) { console.error(e); }
}

window.changeLang = async (l) => {
    userData.lang = l;
    updateUI();
    if(auth.currentUser) await update(ref(db, 'users/'+auth.currentUser.uid), {lang: l});
};

function startPractice() {
    currentTask = [];
    const pool = database[userData.lang || "English"] || database.English;
    for(let i=0; i<20; i++) {
        let item = pool[Math.floor(Math.random()*pool.length)];
        let words = item.ans.split(" ");
        let parts = [...words, "the", "is", "a", "not"].sort(() => Math.random() - 0.5);
        currentTask.push({ pt: item.pt, ans: item.ans, parts: [...new Set(parts)] });
    }
    qIdx = 0;
    document.getElementById('practiceView').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    const q = currentTask[qIdx];
    userGuess = [];
    document.getElementById('targetPhrase').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    const bank = document.getElementById('wordBank');
    bank.innerHTML = "";
    q.parts.forEach(w => {
        const c = document.createElement('div'); c.className = "chip"; c.innerText = w;
        c.onclick = () => {
            if(!c.classList.contains('used')) {
                userGuess.push(w);
                document.getElementById('dropZone').innerHTML += `<span>${w} </span>`;
                c.classList.add('used');
            }
        };
        bank.appendChild(c);
    });
}

document.getElementById('checkBtn').onclick = async () => {
    const guess = userGuess.join(" ").toLowerCase().trim();
    if(guess === currentTask[qIdx].ans.toLowerCase().trim()) {
        qIdx++;
        if(qIdx < 20) renderQuestion();
        else {
            userData.xp = (userData.xp || 0) + 150;
            userData.task = (userData.task || 1) + 1;
            if(userData.task > 10) { userData.task = 1; userData.lvl = (userData.lvl || 1) + 1; }
            await update(ref(db, 'users/'+auth.currentUser.uid), userData);
            alert("Incrível! Você concluiu a tarefa.");
            document.getElementById('practiceView').classList.add('hidden');
            updateUI();
        }
    } else {
        alert("Ops, frase errada. Tente novamente!");
        renderQuestion();
    }
};

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/'+u.uid));
        if(s.exists()) {
            const data = s.val();
            userData = { ...userData, ...data };
        }
        document.getElementById('authView').classList.add('hidden');
        ['mainHeader', 'homeView', 'mainNav'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        updateUI();
    } else {
        document.getElementById('authView').classList.remove('hidden');
        ['mainHeader', 'homeView', 'mainNav', 'practiceView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    }
});

document.getElementById('loginBtn').onclick = async () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    if(!e || p.length < 6) return alert("E-mail e senha (mín. 6 caracteres) obrigatórios.");
    try { await signInWithEmailAndPassword(auth, e, p); }
    catch {
        const r = await createUserWithEmailAndPassword(auth, e, p);
        await set(ref(db, 'users/'+r.user.uid), userData);
    }
};

document.getElementById('startBtn').onclick = startPractice;
</script>
</body>
</html>
