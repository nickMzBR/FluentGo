<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo Pro | Voz & Som</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin:0; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; }
        .card { background: var(--card); padding: 25px; border-radius: 28px; border: 1px solid #334155; margin-bottom: 15px; text-align: center; }
        
        button { padding: 18px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 5px 0 #1D4ED8; }
        .btn-check { background: var(--secondary); color: white; box-shadow: 0 5px 0 #059669; }
        
        /* ÁREA DE RESPOSTA */
        .word-area { min-height: 130px; border: 2px dashed #475569; border-radius: 24px; margin: 25px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.3); }
        .chip { background: #334155; padding: 14px 20px; border-radius: 16px; font-weight: 700; cursor: pointer; border: 1px solid #475569; font-size: 17px; box-shadow: 0 4px 0 #0F172A; color: white; }
        .chip:active { transform: translateY(2px); box-shadow: 0 2px 0 #0F172A; }
        .chip.used { opacity: 0.2; pointer-events: none; transform: scale(0.9); }
        
        /* FEEDBACK BAR */
        #feedbackBar { position: fixed; bottom: 0; left: 0; right: 0; padding: 40px 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; text-align: center; }
        #feedbackBar.correct { transform: translateY(0); background: #065F46; border-top: 5px solid #10B981; }
        #feedbackBar.wrong { transform: translateY(0); background: #991B1B; border-top: 5px solid #EF4444; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

<audio id="sndCorrect" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="sndWrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="sndClick" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<header id="mainHeader" class="hidden">
    <div style="font-weight:900;">FLUENTGO <span id="langTag" style="color:var(--primary)">EN</span></div>
    <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="userXP">0</span></div>
</header>

<main id="homeView" class="container hidden">
    <div class="card" style="margin-top: 50px;">
        <h1 id="levelTxt">Nível 1</h1>
        <p id="taskTxt" style="color:#94a3b8; margin-bottom: 25px;">Carregando progresso...</p>
        <button id="startBtn" class="btn-main">PRATICAR TAREFA</button>
    </div>
</main>

<div id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:5000;">
    <div class="container" id="gameWindow">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="closePractice()" style="width:40px; background:none; font-size: 24px;">✕</button>
            <div style="background:#334155; flex:1; height:12px; margin:0 20px; border-radius:10px;">
                <div id="innerBar" style="width:0%; height:100%; background:var(--secondary); border-radius:10px; transition: 0.5s;"></div>
            </div>
        </div>

        <h2 id="targetPhrase" style="text-align:center; font-size:2.4rem; margin: 50px 0; font-weight: 900;">...</h2>
        
        <div id="dropZone" class="word-area"></div>
        <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:12px;"></div>
        
        <div style="margin-top:auto; padding-bottom:120px;">
            <button id="checkBtn" class="btn-check">VERIFICAR RESPOSTA</button>
        </div>
    </div>

    <div id="feedbackBar">
        <h2 id="feedbackMsg" style="margin:0 0 20px 0; font-size: 1.8rem;">Excelente! ✨</h2>
        <button id="nextBtn" class="btn-main" style="background:white; color:black; box-shadow: 0 5px 0 #ddd;">CONTINUAR</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Banco de frases
const phrases = {
    English: [
        {pt: "Eu bebo leite", en: "i drink milk"},
        {pt: "O gato é preto", en: "the cat is black"},
        {pt: "Eu amo café", en: "i love coffee"},
        {pt: "O carro é azul", en: "the car is blue"},
        {pt: "Eu como pão", en: "i eat bread"}
    ],
    Spanish: [{pt: "Eu bebo leite", en: "yo bebo leche"}]
};

let userData = { xp: 0, lvl: 1, task: 1, lang: "English" };
let currentQ = [];
let qIdx = 0;
let selection = [];

const playSnd = (id) => { const a = document.getElementById(id); a.currentTime = 0; a.play(); };

// FUNÇÃO DE VOZ (O segredo do aprendizado)
function speak(text) {
    const msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = userData.lang === 'English' ? 'en-US' : 'es-ES';
    msg.rate = 0.9; // Um pouco mais lento para clareza
    window.speechSynthesis.speak(msg);
}

function updateUI() {
    document.getElementById('userXP').innerText = userData.xp;
    document.getElementById('levelTxt').innerText = `Nível ${userData.lvl}`;
    document.getElementById('taskTxt').innerText = `Tarefa ${userData.task} de 10`;
}

function startPractice() {
    qIdx = 0;
    currentQ = [];
    const pool = phrases[userData.lang] || phrases.English;
    // Sorteia 5 frases
    let shuffled = [...pool].sort(() => 0.5 - Math.random());
    currentQ = shuffled.slice(0, 5).map(item => ({
        pt: item.pt,
        ans: item.en,
        parts: [...item.en.split(" "), "the", "is"].sort(() => Math.random() - 0.5)
    }));
    
    document.getElementById('practiceView').classList.remove('hidden');
    renderQ();
}

function renderQ() {
    const q = currentQ[qIdx];
    selection = [];
    document.getElementById('innerBar').style.width = `${(qIdx / 5) * 100}%`;
    document.getElementById('targetPhrase').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    document.getElementById('feedbackBar').className = "";
    
    const bank = document.getElementById('wordBank');
    bank.innerHTML = "";
    q.parts.forEach((w, i) => {
        const btn = document.createElement('button');
        btn.className = "chip";
        btn.innerText = w;
        btn.id = "word-"+i;
        btn.onclick = () => {
            playSnd('sndClick');
            selection.push(w);
            btn.classList.add('used');
            const span = document.createElement('span');
            span.className = "chip";
            span.innerText = w;
            document.getElementById('dropZone').appendChild(span);
        };
        bank.appendChild(btn);
    });
}

document.getElementById('checkBtn').onclick = () => {
    const guess = selection.join(" ").toLowerCase().trim();
    const correct = currentQ[qIdx].ans.toLowerCase().trim();
    const bar = document.getElementById('feedbackBar');

    if(guess === correct) {
        playSnd('sndCorrect');
        speak(correct); // FALA A FRASE AO ACERTAR
        bar.className = "correct";
        document.getElementById('feedbackMsg').innerText = "Incrível! ✨";
    } else {
        playSnd('sndWrong');
        document.getElementById('gameWindow').classList.add('shake');
        setTimeout(() => document.getElementById('gameWindow').classList.remove('shake'), 500);
        bar.className = "wrong";
        document.getElementById('feedbackMsg').innerText = "Resposta: " + correct;
    }
};

document.getElementById('nextBtn').onclick = () => {
    document.getElementById('feedbackBar').className = "";
    qIdx++;
    if(qIdx < 5) {
        renderQ();
    } else {
        completeTask();
    }
};

async function completeTask() {
    userData.xp += 100;
    userData.task++;
    if(userData.task > 10) { userData.task = 1; userData.lvl++; }
    await update(ref(db, 'users/'+auth.currentUser.uid), userData);
    alert("🚀 Tarefa Concluída! +100 XP");
    document.getElementById('practiceView').classList.add('hidden');
    updateUI();
}

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/'+u.uid));
        if(s.exists()) userData = s.val();
        document.getElementById('homeView').classList.remove('hidden');
        document.getElementById('mainHeader').classList.remove('hidden');
        updateUI();
    } else {
        window.location.reload(); // Simples redirecionamento se deslogar
    }
});

document.getElementById('startBtn').onclick = startPractice;
window.closePractice = () => document.getElementById('practiceView').classList.add('hidden');
</script>
</body>
</html>
