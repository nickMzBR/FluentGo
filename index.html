<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluentGo Pro | Estável v7</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --secondary: #10B981; --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --gold: #F59E0B; --error: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { margin:0; background: var(--bg); color: var(--text); overflow-x: hidden; height: 100vh; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0F172A; border-bottom: 1px solid #334155; position: sticky; top:0; z-index:100; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #334155; margin-bottom: 15px; text-align: center; }
        
        /* BOTÕES */
        button { padding: 16px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; font-size: 15px; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 0 #1D4ED8; margin-top: 10px; }
        .btn-check { background: var(--secondary); color: white; box-shadow: 0 4px 0 #059669; }
        .btn-lang { background: #334155; color: white; border: 1px solid #475569; margin: 5px 0; }
        .active-lang { border: 2px solid var(--primary); background: rgba(37, 99, 235, 0.2); }

        /* NAVEGAÇÃO */
        nav { position: fixed; bottom: 0; width: 100%; background: #1E293B; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #334155; z-index: 1000; }
        nav div { font-size: 24px; cursor: pointer; opacity: 0.4; }
        nav div.active { opacity: 1; color: var(--primary); }

        /* TAREFA */
        .word-area { min-height: 120px; border: 2px dashed #475569; border-radius: 20px; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 15px; background: rgba(0,0,0,0.2); }
        .chip { background: #334155; padding: 12px 16px; border-radius: 14px; font-weight: 700; cursor: pointer; border: 1px solid #475569; font-size: 16px; color: white; box-shadow: 0 3px 0 #0F172A; }
        .chip.used { opacity: 0.2; pointer-events: none; }
        
        /* FEEDBACK BAR */
        #feedbackBar { position: fixed; bottom: 0; left: 0; right: 0; padding: 25px; transform: translateY(100%); transition: 0.3s ease; z-index: 6000; text-align: center; border-radius: 20px 20px 0 0; }
        #feedbackBar.correct { transform: translateY(0); background: #065F46; }
        #feedbackBar.wrong { transform: translateY(0); background: #991B1B; }
    </style>
</head>
<body>

<audio id="sndCorrect" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="sndWrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="sndClick" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<header id="mainHeader" class="hidden">
    <div style="font-weight:900;">FLUENTGO <span id="langTag" style="color:var(--primary)">EN</span></div>
    <div style="font-weight: 800; color: var(--secondary);">🔥 <span id="userXP">0</span></div>
</header>

<main id="authView" class="container">
    <h1 style="text-align:center; font-size:3rem; font-weight:900; margin: 40px 0;">FluentGo</h1>
    <div class="card">
        <input type="email" id="email" placeholder="E-mail" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; background:#0F172A; color:white; border:1px solid #334155;">
        <input type="password" id="password" placeholder="Senha" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; background:#0F172A; color:white; border:1px solid #334155;">
        <button id="loginBtn" class="btn-main">ENTRAR / CADASTRAR</button>
    </div>
</main>

<main id="homeView" class="container hidden">
    <div class="card">
        <h2 id="levelTxt">Nível 1</h2>
        <p id="taskTxt">Tarefa 1 de 10</p>
        <button id="startBtn" class="btn-main">PRATICAR AGORA</button>
    </div>
    
    <div class="card" style="padding: 10px;">
        <p style="font-size: 12px; font-weight: 800; color: #64748b; margin-bottom: 10px;">TROCAR IDIOMA</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="changeLang('English')" class="btn-lang" id="lang-English">🇺🇸 Inglês</button>
            <button onclick="changeLang('Spanish')" class="btn-lang" id="lang-Spanish">🇪🇸 Espanhol</button>
        </div>
    </div>
</main>

<main id="rankingView" class="container hidden">
    <h3 style="text-align: center;">🏆 Top 10 Alunos</h3>
    <div id="leaderboard" class="card"></div>
</main>

<div id="practiceView" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:5000; overflow: hidden;">
    <div class="container" style="display: flex; flex-direction: column; height: 100%;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="closePractice()" style="width:50px; background:none; font-size: 24px;">✕</button>
            <div style="background:#334155; flex:1; height:10px; margin:0 15px; border-radius:10px;">
                <div id="innerBar" style="width:0%; height:100%; background:var(--secondary); border-radius:10px;"></div>
            </div>
        </div>

        <h2 id="targetPhrase" style="text-align:center; font-size:1.8rem; margin: 30px 0; font-weight: 900;">...</h2>
        
        <div id="dropZone" class="word-area"></div>
        <div id="wordBank" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        
        <div style="margin-top: auto; padding-bottom: 30px;">
            <button id="checkBtn" class="btn-check">VERIFICAR RESPOSTA</button>
        </div>
    </div>

    <div id="feedbackBar">
        <h2 id="feedbackMsg" style="margin:0 0 15px 0; color: white;">...</h2>
        <button id="nextBtn" style="background: white; color: black;">CONTINUAR</button>
    </div>
</div>

<nav id="mainNav" class="hidden">
    <div onclick="showTab('homeView')" id="nav-home" class="active">🏠</div>
    <div onclick="showTab('rankingView')" id="nav-ranking">🏆</div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyC1sJGJ26On1MFxsl3KDOCAdDxd_yKbkrw", authDomain: "fluentgo-35024.firebaseapp.com", databaseURL: "https://fluentgo-35024-default-rtdb.firebaseio.com", projectId: "fluentgo-35024", appId: "1:613715387990:web:0345ade26374dd32d1fdf7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const phrases = {
    English: [
        {pt: "O carro é azul", en: "the car is blue"},
        {pt: "Eu bebo leite", en: "i drink milk"},
        {pt: "O gato é preto", en: "the cat is black"},
        {pt: "A casa é grande", en: "the house is big"}
    ],
    Spanish: [{pt: "Eu bebo leite", en: "yo bebo leche"}]
};

// Segurança contra Undefined
let userData = { xp: 0, lvl: 1, task: 1, lang: "English" };
let currentQ = [];
let qIdx = 0;
let selection = [];

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = userData.lang === 'English' ? 'en-US' : 'es-ES';
    window.speechSynthesis.speak(msg);
}

window.showTab = (id) => {
    document.getElementById('homeView').classList.add('hidden');
    document.getElementById('rankingView').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
    document.getElementById('nav-'+id.replace('View','')).classList.add('active');
    if(id === 'rankingView') loadRanking();
};

async function loadRanking() {
    const snap = await get(ref(db, 'users'));
    const board = document.getElementById('leaderboard');
    board.innerHTML = "";
    let users = [];
    snap.forEach(u => users.push(u.val()));
    users.sort((a,b) => b.xp - a.xp).slice(0,10).forEach((u, i) => {
        board.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #334155;">
            <span>${i+1}. ${u.email ? u.email.split('@')[0] : 'User'}</span><b>${u.xp || 0} XP</b>
        </div>`;
    });
}

window.changeLang = async (l) => {
    userData.lang = l;
    updateUI();
    if(auth.currentUser) await update(ref(db, 'users/'+auth.currentUser.uid), {lang: l});
};

function updateUI() {
    document.getElementById('userXP').innerText = userData.xp || 0;
    document.getElementById('levelTxt').innerText = `Nível ${userData.lvl || 1}`;
    document.getElementById('taskTxt').innerText = `Tarefa ${userData.task || 1} de 10`;
    document.getElementById('langTag').innerText = (userData.lang || "EN").substring(0,2).toUpperCase();
    document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active-lang'));
    document.getElementById('lang-'+userData.lang)?.classList.add('active-lang');
}

document.getElementById('startBtn').onclick = () => {
    qIdx = 0;
    currentQ = [...phrases[userData.lang]].sort(() => 0.5 - Math.random()).slice(0,5);
    document.getElementById('practiceView').classList.remove('hidden');
    renderQ();
};

function renderQ() {
    const q = currentQ[qIdx];
    selection = [];
    document.getElementById('innerBar').style.width = `${(qIdx / 5) * 100}%`;
    document.getElementById('targetPhrase').innerText = q.pt;
    document.getElementById('dropZone').innerHTML = "";
    document.getElementById('feedbackBar').className = "";
    
    const bank = document.getElementById('wordBank');
    bank.innerHTML = "";
    let parts = [...q.en.split(" "), "is", "a"].sort(() => Math.random() - 0.5);
    parts.forEach((w, i) => {
        const btn = document.createElement('button');
        btn.className = "chip"; btn.innerText = w; btn.id = "w-"+i;
        btn.onclick = () => {
            document.getElementById('sndClick').play();
            selection.push(w);
            btn.classList.add('used');
            const span = document.createElement('span'); span.className = "chip"; span.innerText = w;
            document.getElementById('dropZone').appendChild(span);
        };
        bank.appendChild(btn);
    });
}

document.getElementById('checkBtn').onclick = () => {
    const guess = selection.join(" ").toLowerCase();
    const correct = currentQ[qIdx].en.toLowerCase();
    const bar = document.getElementById('feedbackBar');
    if(guess === correct) {
        document.getElementById('sndCorrect').play();
        speak(correct);
        bar.className = "correct";
        document.getElementById('feedbackMsg').innerText = "Correto! ✨";
    } else {
        document.getElementById('sndWrong').play();
        bar.className = "wrong";
        document.getElementById('feedbackMsg').innerText = "Resposta: " + correct;
    }
};

document.getElementById('nextBtn').onclick = async () => {
    document.getElementById('feedbackBar').className = "";
    qIdx++;
    if(qIdx < 5) renderQ();
    else {
        userData.xp += 50;
        userData.task++;
        if(userData.task > 10) { userData.task = 1; userData.lvl++; }
        await update(ref(db, 'users/'+auth.currentUser.uid), userData);
        document.getElementById('practiceView').classList.add('hidden');
        updateUI();
    }
};

onAuthStateChanged(auth, async (u) => {
    if(u) {
        const s = await get(ref(db, 'users/'+u.uid));
        if(s.exists()) userData = {...userData, ...s.val()};
        document.getElementById('authView').classList.add('hidden');
        ['mainHeader', 'homeView', 'mainNav'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        updateUI();
    }
});

document.getElementById('loginBtn').onclick = async () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    try { await signInWithEmailAndPassword(auth, e, p); }
    catch { 
        const r = await createUserWithEmailAndPassword(auth, e, p);
        await set(ref(db, 'users/'+r.user.uid), userData);
    }
};

window.closePractice = () => document.getElementById('practiceView').classList.add('hidden');
</script>
</body>
</html>
